<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root {
  --bg: #0b0f14;
  --bg-2: #131922;
  --bg-3: #1c2530;
  --border: #2a3441;
  --text: #e6edf3;
  --text-dim: #8b98a8;
  --text-faint: #5a6776;
  --accent: #22c55e;
  --accent-dim: #16a34a;
  --warn: #f59e0b;
  --danger: #ef4444;
  --radius: 14px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior-y: contain; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}
#app {
  max-width: 720px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(11,15,20,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top) 16px 0;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.01em;
}
.logo-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 14px; font-weight: 800;
}
.sync-btn {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.sync-btn.syncing { color: var(--warn); }
.sync-btn.error { color: var(--danger); border-color: var(--danger); }
.sync-btn.ok { color: var(--accent); }

main {
  flex: 1;
  padding: 16px 16px 100px;
}
nav.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(11,15,20,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 10;
}
nav.bottom button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-faint);
  padding: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
nav.bottom button.active { color: var(--accent); }
nav.bottom button svg { width: 22px; height: 22px; }

h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
h2 { font-size: 16px; font-weight: 600; margin: 18px 0 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; }
h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }

.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.card-big { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.card-sub { color: var(--text-dim); font-size: 14px; }

label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
input[type="text"], input[type="number"], input[type="password"], textarea, select {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 16px;
  font-family: inherit;
  transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.05s, background 0.15s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-dim); }
.btn-primary:disabled { background: var(--bg-3); color: var(--text-faint); cursor: not-allowed; }
.btn-secondary { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--text-dim); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-full { width: 100%; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.btn-row > .btn { flex: 1; }

.field { margin-bottom: 16px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
}
.chip.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.photo-input {
  display: block;
  width: 100%;
  aspect-ratio: 3/4;
  max-height: 380px;
  background: var(--bg-3);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.photo-input img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-input .placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px;
  color: var(--text-dim);
  font-size: 14px;
  text-align: center;
  padding: 20px;
}
.photo-input input { display: none; }
.photo-input .change-overlay {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(0,0,0,0.65); color: white;
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
}

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-grid .card { margin-bottom: 0; }

.entries-list { display: flex; flex-direction: column; gap: 10px; }
.entry-row {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  display: flex;
  gap: 14px;
  align-items: center;
  cursor: pointer;
}
.entry-row:hover { border-color: var(--accent-dim); }
.entry-thumb {
  width: 56px; height: 56px;
  background: var(--bg-3);
  border-radius: 10px;
  flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-faint);
  font-size: 11px;
}
.entry-thumb img { width: 100%; height: 100%; object-fit: cover; }
.entry-info { flex: 1; min-width: 0; }
.entry-date { font-size: 14px; font-weight: 600; }
.entry-meta { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.photo-grid .photo-cell {
  aspect-ratio: 3/4;
  background: var(--bg-3);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.photo-grid .photo-cell img { width: 100%; height: 100%; object-fit: cover; }
.photo-grid .photo-cell .label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  padding: 14px 6px 4px;
  font-size: 10px; font-weight: 600; color: white;
  text-align: center;
}

.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-faint);
}
.empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.5; }

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 18px;
  border-radius: 999px;
  font-size: 14px;
  z-index: 100;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  animation: toast-in 0.2s;
}
.toast.success { border-color: var(--accent); color: var(--accent); }
.toast.error { border-color: var(--danger); color: var(--danger); }
@keyframes toast-in {
  from { opacity: 0; transform: translate(-50%, 10px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 500px;
  max-height: 90dvh;
  overflow-y: auto;
  padding: 20px;
}
.modal img { max-width: 100%; border-radius: var(--radius-sm); display: block; margin: 0 auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.modal-close { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 0 6px; }

.chart-wrap { position: relative; height: 240px; }
.chart-legend { display: flex; gap: 14px; font-size: 12px; color: var(--text-dim); margin-top: 8px; justify-content: center; }
.chart-legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

.streak-banner {
  background: linear-gradient(135deg, #16a34a, #15803d);
  border-radius: var(--radius);
  padding: 16px;
  display: flex; align-items: center; gap: 14px;
  color: white;
  margin-bottom: 12px;
}
.streak-banner .flame { font-size: 32px; }
.streak-banner .info .num { font-size: 22px; font-weight: 700; line-height: 1; }
.streak-banner .info .lbl { font-size: 13px; opacity: 0.85; }

.notice {
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.3);
  color: var(--warn);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 12px;
}

.muted { color: var(--text-dim); }
.faint { color: var(--text-faint); }
.tiny { font-size: 12px; }
hr.sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

.energy-row { display: flex; gap: 8px; }
.energy-row button {
  flex: 1;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 12px 0;
  border-radius: var(--radius-sm);
  font-size: 20px;
  cursor: pointer;
}
.energy-row button.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.energy-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-faint); margin-top: 4px; padding: 0 4px; }

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

@media (min-width: 600px) {
  main { padding: 24px 24px 100px; }
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
  .photo-grid { grid-template-columns: repeat(5, 1fr); }
}
</style>
</head>

<script>
// =================== STATE ===================
const STORAGE_KEY = 'living-life-config';
const DATA_KEY = 'living-life-data';
const ACTIVITY_OPTIONS = ['Walk', 'Routine A (push & legs)', 'Routine B (pull & core)', 'Routine C (full body)', 'C25K run', 'Rest day', 'Other'];

let state = {
  config: { owner: '', repo: '', token: '', branch: 'main' },
  data: { version: 1, entries: {} },
  dataSha: null,
  currentScreen: 'today',
  draft: {},
  isSyncing: false,
  lastSyncError: null,
  lastSyncOk: null,
};

// =================== UTILITIES ===================
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}
function fmtDateLong(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function daysAgo(iso) {
  const a = new Date(iso + 'T00:00:00');
  const b = new Date(today() + 'T00:00:00');
  return Math.round((b - a) / (1000*60*60*24));
}
function loadLocal() {
  try {
    const c = localStorage.getItem(STORAGE_KEY);
    if (c) state.config = { ...state.config, ...JSON.parse(c) };
  } catch(e) {}
  try {
    const d = localStorage.getItem(DATA_KEY);
    if (d) {
      const parsed = JSON.parse(d);
      state.data = parsed.data || state.data;
      state.dataSha = parsed.sha || null;
    }
  } catch(e) {}
}
function saveLocalConfig() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.config)); }
function saveLocalData() { localStorage.setItem(DATA_KEY, JSON.stringify({ data: state.data, sha: state.dataSha })); }

function isConfigured() {
  return state.config.owner && state.config.repo && state.config.token;
}

function toast(msg, type='') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function setSyncStatus(status) {
  const btn = document.getElementById('sync-btn');
  const label = document.getElementById('sync-label');
  btn.classList.remove('syncing', 'error', 'ok');
  if (status === 'syncing') { btn.classList.add('syncing'); label.textContent = 'Syncing…'; }
  else if (status === 'error') { btn.classList.add('error'); label.textContent = 'Sync error'; }
  else if (status === 'ok') { btn.classList.add('ok'); label.textContent = 'Synced'; setTimeout(()=>{ label.textContent = 'Sync'; btn.classList.remove('ok'); }, 1800); }
  else { label.textContent = 'Sync'; }
}

// =================== GITHUB API ===================
async function ghRequest(method, path, body) {
  const url = `https://api.github.com/repos/${state.config.owner}/${state.config.repo}/${path}`;
  const res = await fetch(url, {
    method,
    headers: {
      'Authorization': `Bearer ${state.config.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(body ? { 'Content-Type': 'application/json' } : {})
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 404) return { notFound: true };
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`GitHub ${res.status}: ${txt.slice(0, 200)}`);
  }
  return res.json();
}

function b64encodeUtf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64decodeUtf8(str) {
  try { return decodeURIComponent(escape(atob(str.replace(/\s/g, '')))); } catch(e) { return ''; }
}

async function ghGetFile(path) {
  const branch = state.config.branch || 'main';
  return ghRequest('GET', `contents/${encodeURIComponent(path).replace(/%2F/g,'/')}?ref=${branch}`);
}
async function ghPutFile(path, contentB64, message, sha) {
  const branch = state.config.branch || 'main';
  const body = { message, content: contentB64, branch };
  if (sha) body.sha = sha;
  return ghRequest('PUT', `contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`, body);
}

async function pullData() {
  setSyncStatus('syncing');
  state.isSyncing = true;
  try {
    const result = await ghGetFile('data/log.json');
    if (result.notFound) {
      // First time — file doesn't exist yet
      state.dataSha = null;
      saveLocalData();
      setSyncStatus('ok');
    } else {
      const decoded = b64decodeUtf8(result.content);
      const parsed = JSON.parse(decoded);
      state.data = parsed;
      state.dataSha = result.sha;
      saveLocalData();
      setSyncStatus('ok');
    }
    state.lastSyncError = null;
    state.lastSyncOk = new Date().toISOString();
  } catch (e) {
    state.lastSyncError = e.message;
    setSyncStatus('error');
    throw e;
  } finally {
    state.isSyncing = false;
  }
}

async function pushData() {
  setSyncStatus('syncing');
  state.isSyncing = true;
  try {
    const content = b64encodeUtf8(JSON.stringify(state.data, null, 2));
    const result = await ghPutFile('data/log.json', content, `update log ${today()}`, state.dataSha);
    state.dataSha = result.content.sha;
    saveLocalData();
    setSyncStatus('ok');
    state.lastSyncError = null;
    state.lastSyncOk = new Date().toISOString();
  } catch (e) {
    state.lastSyncError = e.message;
    setSyncStatus('error');
    throw e;
  } finally {
    state.isSyncing = false;
  }
}

async function uploadPhoto(dateIso, dataUrl) {
  // dataUrl is "data:image/jpeg;base64,...."
  const b64 = dataUrl.split(',')[1];
  const path = `data/photos/${dateIso}.jpg`;
  // Check if exists for SHA
  let sha = null;
  try {
    const existing = await ghGetFile(path);
    if (existing && !existing.notFound) sha = existing.sha;
  } catch(e) { /* ignore, treat as new */ }
  await ghPutFile(path, b64, `photo ${dateIso}`, sha);
  return path;
}

async function downloadPhotoAsDataUrl(path) {
  try {
    const res = await ghGetFile(path);
    if (res.notFound) return null;
    // Photo content is base64 from the API
    return 'data:image/jpeg;base64,' + res.content.replace(/\s/g, '');
  } catch(e) {
    return null;
  }
}

async function manualSync() {
  if (!isConfigured()) {
    toast('Configure GitHub in Settings first', 'error');
    navigate('settings');
    return;
  }
  if (state.isSyncing) return;
  try {
    await pullData();
    render();
    toast('Synced from GitHub', 'success');
  } catch (e) {
    toast('Sync failed: ' + e.message, 'error');
  }
}

// =================== IMAGE COMPRESSION ===================
function compressImage(file, maxDim = 1080, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// =================== STREAK & STATS ===================
function calcStreak() {
  let streak = 0;
  let d = new Date(today() + 'T00:00:00');
  while (true) {
    const iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (state.data.entries[iso]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      // If today is not yet logged, streak starts counting from yesterday
      if (iso === today() && streak === 0) {
        d.setDate(d.getDate() - 1);
        continue;
      }
      break;
    }
  }
  return streak;
}

function weightStats() {
  const entries = Object.entries(state.data.entries)
    .filter(([d, e]) => typeof e.weight === 'number')
    .sort((a,b) => a[0].localeCompare(b[0]));
  if (entries.length === 0) return null;
  const latest = entries[entries.length - 1];
  const first = entries[0];
  // 7-day moving average
  const avg = (arr) => arr.reduce((s,x)=>s+x,0) / arr.length;
  const last7 = entries.slice(-7).map(e => e[1].weight);
  const prev7 = entries.slice(-14, -7).map(e => e[1].weight);
  const avgNow = last7.length ? avg(last7) : null;
  const avgPrev = prev7.length ? avg(prev7) : null;
  return {
    latest: latest[1].weight,
    latestDate: latest[0],
    first: first[1].weight,
    firstDate: first[0],
    totalChange: latest[1].weight - first[1].weight,
    avgNow,
    avgPrev,
    weekChange: (avgNow !== null && avgPrev !== null) ? avgNow - avgPrev : null,
    points: entries.map(([d, e]) => ({ x: d, y: e.weight }))
  };
}

// =================== HANDLERS: TODAY ===================
function bindTodayHandlers() {
  // Weight
  document.getElementById('weight-input').addEventListener('input', e => {
    state.draft.weight = e.target.value === '' ? '' : parseFloat(e.target.value);
  });
  // Photo
  document.getElementById('photo-file').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    toast('Compressing photo…');
    try {
      const dataUrl = await compressImage(file);
      state.draft.photoDataUrl = dataUrl;
      // Re-render the today screen so the preview updates and handlers re-bind cleanly
      render();
    } catch (err) {
      toast('Photo error: ' + err.message, 'error');
    }
  });
  // Activities
  document.querySelectorAll('#activity-chips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const a = chip.dataset.activity;
      const idx = state.draft.activities.indexOf(a);
      if (idx >= 0) state.draft.activities.splice(idx, 1);
      else state.draft.activities.push(a);
      chip.classList.toggle('selected');
    });
  });
  // Meals/notes/lipoma
  document.getElementById('meals-input').addEventListener('input', e => state.draft.meals = e.target.value);
  document.getElementById('notes-input').addEventListener('input', e => state.draft.notes = e.target.value);
  document.getElementById('lipoma-input').addEventListener('input', e => state.draft.lipomaNote = e.target.value);
  // Energy
  document.querySelectorAll('#energy-row button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.draft.energy = parseInt(btn.dataset.energy, 10);
      document.querySelectorAll('#energy-row button').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
  // Save
  document.getElementById('save-btn').addEventListener('click', saveDraft);
}

async function saveDraft() {
  if (!isConfigured()) { toast('Configure GitHub first', 'error'); navigate('settings'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = 'Saving…';
  try {
    const t = state.draft.date;
    // Upload photo if new
    let photoPath = state.draft.photoPath;
    if (state.draft.photoDataUrl) {
      photoPath = await uploadPhoto(t, state.draft.photoDataUrl);
    }
    // Build entry
    const entry = {};
    if (state.draft.weight !== '' && state.draft.weight != null && !isNaN(state.draft.weight)) entry.weight = parseFloat(state.draft.weight);
    if (photoPath) entry.photo = photoPath;
    if (state.draft.activities.length) entry.activities = state.draft.activities;
    if (state.draft.meals.trim()) entry.meals = state.draft.meals.trim();
    if (state.draft.notes.trim()) entry.notes = state.draft.notes.trim();
    if (state.draft.lipomaNote.trim()) entry.lipomaNote = state.draft.lipomaNote.trim();
    if (state.draft.energy) entry.energy = state.draft.energy;
    entry.updatedAt = new Date().toISOString();
    state.data.entries[t] = entry;
    await pushData();
    saveLocalData();
    state.draft = {};
    toast('Saved ✓', 'success');
    render();
  } catch (e) {
    toast('Save failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

  document.body.appendChild(modal);
  if (entry.photo) {
    const dataUrl = await downloadPhotoAsDataUrl(entry.photo);
    const target = document.getElementById('modal-photo');
    if (target) {
      if (dataUrl) target.innerHTML = `<img src="${dataUrl}" alt="photo">`;
      else target.textContent = 'Photo unavailable';
    }
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

// =================== HANDLERS: SETTINGS ===================
function bindSettingsHandlers() {
  document.getElementById('save-config-btn').addEventListener('click', async () => {
    state.config.owner = document.getElementById('cfg-owner').value.trim();
    state.config.repo = document.getElementById('cfg-repo').value.trim();
    state.config.branch = document.getElementById('cfg-branch').value.trim() || 'main';
    state.config.token = document.getElementById('cfg-token').value.trim();
    saveLocalConfig();
    toast('Settings saved');
    if (isConfigured()) {
      try { await pullData(); toast('Connected & synced', 'success'); render(); } catch(e) { toast('Saved, but sync failed: ' + e.message, 'error'); }
    }
  });
  document.getElementById('test-btn').addEventListener('click', async () => {
    const owner = document.getElementById('cfg-owner').value.trim();
    const repo = document.getElementById('cfg-repo').value.trim();
    const token = document.getElementById('cfg-token').value.trim();
    if (!owner || !repo || !token) { toast('Fill all fields first', 'error'); return; }
    try {
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
      });
      if (res.ok) {
        const j = await res.json();
        toast(`✓ Connected to ${j.full_name}`, 'success');
      } else {
        const t = await res.text();
        toast(`Error ${res.status}: ${t.slice(0,80)}`, 'error');
      }
    } catch (e) { toast('Network error: ' + e.message, 'error'); }
  });
  document.getElementById('export-btn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `living-life-export-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (confirm('Clear local cache? Your GitHub data is safe — this only clears this device.')) {
      localStorage.removeItem(DATA_KEY);
      state.data = { version: 1, entries: {} };
      state.dataSha = null;
      toast('Local cache cleared');
      render();
    }
  });
}

// =================== CHART ===================
let chartInstance = null;
function drawWeightChart() {
  const stats = weightStats();
  if (!stats || stats.points.length === 0) {
    const canvas = document.getElementById('weight-chart');
    if (canvas) { canvas.parentElement.innerHTML = '<div class="empty" style="padding:30px 10px"><div>Log a few days of weight to see the trend.</div></div>'; }
    return;
  }
  // 7-day moving avg
  const points = stats.points;
  const avgPoints = points.map((p, i) => {
    const window = points.slice(Math.max(0, i - 6), i + 1).map(x => x.y);
    return { x: p.x, y: window.reduce((s,v)=>s+v,0) / window.length };
  });
  const ctx = document.getElementById('weight-chart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: points.map(p => p.x),
      datasets: [
        {
          label: 'Daily',
          data: points.map(p => p.y),
          borderColor: '#5a6776',
          backgroundColor: '#5a6776',
          pointRadius: 2.5,
          pointHoverRadius: 5,
          borderWidth: 0,
          showLine: false,
        },
        {
          label: '7-day avg',
          data: avgPoints.map(p => p.y),
          borderColor: '#22c55e',
          backgroundColor: 'rgba(34,197,94,0.15)',
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2.5,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1c2530', borderColor: '#2a3441', borderWidth: 1, titleColor: '#e6edf3', bodyColor: '#e6edf3', callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y.toFixed(1)} kg` } } },
      scales: {
        x: { ticks: { color: '#5a6776', maxTicksLimit: 6, font: { size: 10 } }, grid: { color: 'rgba(42,52,65,0.4)' } },
        y: { ticks: { color: '#5a6776', font: { size: 10 }, callback: v => v + 'kg' }, grid: { color: 'rgba(42,52,65,0.4)' } }
      }
    }
  });
  // Load photo thumbs
  document.querySelectorAll('#photo-grid .photo-cell').forEach(async (cell) => {
    const path = cell.dataset.path;
    cell.addEventListener('click', () => openEntryModal(cell.dataset.date));
    const dataUrl = await downloadPhotoAsDataUrl(path);
    if (dataUrl) {
      const label = cell.querySelector('.label').outerHTML;
      cell.innerHTML = `<img src="${dataUrl}" alt="">${label}`;
    }
  });
}

// =================== BOOT ===================
loadLocal();
render();
if (isConfigured()) {
  // Background sync on boot
  pullData().then(() => render()).catch(e => console.warn('Background sync failed', e));
}
</script>
