<style>
:root{--surface-outer:#E6EFF6;--surface-cream:#FAF6EE;--surface-white:#FFFFFF;--surface-sky:#E0EBF4;--ink:#1A1F2E;--muted:#7C8497;--faint:#B7BCC9;--coral:#ED7A4D;--coral-s:#F8D9C9;--sky:#6DA9D6;--sky-s:#D2E2EF;--sun:#F2C84B;--sun-s:#FBEBB6;--mint:#8CCB9C;--mint-s:#D5EBDA;--cta:#0F0F12;--border:#D9DFE6;--border-l:#E8EBF0;--success:#4DA869;--success-s:#E8F3EC;--strava:#FC5200;--danger:#E26060;--r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;--sh-card:0 2px 12px rgba(26,31,46,0.04);--sh-elev:0 8px 24px rgba(26,31,46,0.08);--sh-up:0 -4px 16px rgba(26,31,46,0.05)}

#root{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--surface-cream)}

.status-bar .icons{font-size:13px;font-weight:600;opacity:0.85;letter-spacing:2px}
.top-bar{display:flex;align-items:center;gap:14px;padding:14px 20px 8px;flex-shrink:0}
.back-btn{width:44px;height:44px;border-radius:22px;background:var(--surface-white);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--ink);flex-shrink:0}

main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 24px;-webkit-overflow-scrolling:touch}
main.with-nav{padding-bottom:110px}
h1.pt{font-size:30px;font-weight:700;letter-spacing:-0.02em;padding:4px 0}
h2.sec{font-size:12px;font-weight:600;letter-spacing:0.08em;color:var(--muted);margin:24px 0 12px;text-transform:uppercase}
h3{font-size:16px;font-weight:600}
.muted{color:var(--muted)}
.tiny{font-size:12px}
.faint{color:var(--faint)}
.card{background:var(--surface-white);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh-card)}
.card-flat{background:var(--surface-white);border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--sh-card)}
.card-tinted{background:var(--surface-sky);border-radius:var(--r-lg);padding:20px;margin-bottom:12px}
.card-cta{background:var(--cta);color:white;border-radius:var(--r-lg);padding:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:18px 28px;border-radius:var(--r-xl);font-size:16px;font-weight:600;white-space:nowrap;transition:transform 0.05s,opacity 0.15s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--cta);color:white}
.btn-secondary{background:var(--surface-white);color:var(--ink);border:1.5px solid var(--ink)}

input[type="text"],input[type="number"],input[type="password"],input[type="email"],input[type="date"],textarea,select{width:100%;background:var(--surface-white);border:1.5px solid var(--border);color:var(--ink);border-radius:var(--r-md);padding:14px 16px;font-size:16px;font-family:inherit;transition:border-color 0.15s}

.chip{display:inline-flex;align-items:center;background:var(--surface-white);border:1.5px solid var(--border);color:var(--ink);padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap}

nav.bnav .tab.active .ic{background:var(--cta)}
nav.bnav .tab .ic svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.toast.success{background:var(--success)}

@keyframes slide-up{from{transform:translateY(20px)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 16px;opacity:0.4}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;vertical-align:middle}
.spinner.dark{border-color:rgba(15,15,18,0.2);border-top-color:var(--cta)}

.empty{text-align:center;padding:60px 24px;color:var(--faint)}
.empty .emoji{font-size:48px;margin-bottom:16px}
.empty h3{color:var(--muted);font-weight:600;margin-bottom:6px}
.empty p{font-size:14px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.text-center{text-align:center}.text-right{text-align:right}
.flex{display:flex}.flex-1{flex:1}.gap-2{gap:8px}.gap-3{gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
</style>

<script>

const ACTIVITIES=['Walk','Routine A','Routine B','Routine C','C25K run','Outdoor run','Treadmill','Rest day'];
const ROUTINES={
  A:{name:'Routine A',subtitle:'Push & legs',exercises:[
    {id:'pushup',name:'Wall pushups',variants:['wall','incline','knee','standard','decline'],defaultReps:10,sets:3,restSec:60,color:'coral'},

const SUPPLEMENTS=[
  {id:'creatine',name:'Creatine monohydrate',dose:'5 g',timing:'anytime',color:'coral',ini:'C'},
  {id:'whey',name:'Whey protein',dose:'25-50 g',timing:'post-workout / breakfast',color:'sun',ini:'W'},
  {id:'d3',name:'Vitamin D3',dose:'2000 IU',timing:'with breakfast (fat)',color:'sky',ini:'D'},

];
// =================== DATABASE LOADERS ===================
const DB_BASE='https://raw.githubusercontent.com/vedantpatel699/living-life-app/main/data/';
const DB={foods:null,exercises:null,supplements:null,c25k:null,foodsBySlug:{}};
async function loadDB(name){
  if(DB[name])return DB[name];
  try{
    const r=await fetch(DB_BASE+name+'.json',{cache:'no-cache'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    DB[name]=await r.json();
    if(name==='foods'){
      // build search index
      DB.foodsBySlug={};
      for(const f of DB.foods.foods){DB.foodsBySlug[f.id]=f}
    }
    return DB[name];
  }catch(e){console.warn('DB load',name,e);return null}
}
async function loadAllDB(){await Promise.all(['foods','exercises','supplements','c25k'].map(loadDB))}

// Today's supplement schedule
function todaySuppSchedule(){
  if(!DB.supplements)return null;
  const phase=currentPhase(),week=currentWeek();
  const sched=todaySchedule();
  const isTrainingDay=sched.type==='routine'||sched.type==='c25k';
  const isRunDay=sched.type==='c25k';
  const slots=DB.supplements.dailySchedule.map(slot=>{
    const items=slot.include.map(id=>{
      const s=DB.supplements.supplements.find(x=>x.id===id);
      if(!s)return null;
      if(s.phaseFromWeek&&week<s.phaseFromWeek*0+1&&phase<2&&s.id==='electrolytes')return null;
      if(s.frequency==='training-days-only'&&!isTrainingDay)return null;
      if(s.frequency==='run-days-only'&&!isRunDay)return null;
      return s;
    }).filter(Boolean);
    if(slot.conditional==='training-day'&&!isTrainingDay)return null;
    if(items.length===0)return null;
    return{...slot,items};
  }).filter(Boolean);
  return slots;
}

// Generate today's recommendation (Claude-powered or rule-based fallback)
async function generateTodayRec(force=false){
  const cacheKey='rec-'+today();
  if(!force){
    const cached=localStorage.getItem(cacheKey);
    if(cached){try{return JSON.parse(cached)}catch(e){}}
  }
  const sched=todaySchedule(),stats=weightStats(),streak=calcStreak();
  // Rule-based default rec
  const ruleRec={
    headline:sched.activity,
    body:`Phase ${currentPhase()} · Week ${currentWeek()} · ${PHASES[currentPhase()].name}. ${streak>0?'🔥 '+streak+'-day streak — keep it going.':'Start the streak today.'}`,
    action:sched.type==='routine'?'workout':sched.type==='c25k'?'c25k':sched.type==='walk'?'logRun':'logEntry',
    actionLabel:sched.type==='routine'?'Begin workout':sched.type==='c25k'?'Start C25K':sched.type==='walk'?'Log walk':'Log today',
    source:'rules',
  };
  if(!hasClaudeKey())return ruleRec;
  // Try Claude for personalized rec
  try{
    const recent=Object.entries(state.data.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7).map(([d,e])=>({d,weight:e.weight,activities:e.activities,energy:e.energy,sleep:e.sleep}));
    const sys=`You are Vedant's fitness coach. Generate today's recommendation in JSON format. Be brief, warm, specific. 

Output ONLY valid JSON with these keys:
{"headline": "Short title (3-5 words)", "body": "1-2 sentence body grounded in his data", "action": "workout|c25k|logRun|logEntry|coach", "actionLabel": "Button text"}

Context:
- Phase ${currentPhase()} · Week ${currentWeek()}
- Today scheduled: ${sched.activity}
- Streak: ${streak} days
- 7-day weight trend: ${stats?.avgNow?.toFixed(1)||'—'} kg (change ${stats?.weekChange?.toFixed(2)||'—'})
- Last 7 days: ${JSON.stringify(recent)}

Rules: If recent energy is low (<3 average) or notes mention soreness/fatigue, suggest rest or lighter session. If they've missed 2+ days, gently address it. Otherwise endorse the schedule.`;
    const t=await callClaude([{role:'user',content:"Today's recommendation please."}],sys,500);
    const json=t.match(/\{[\s\S]*\}/)?.[0];
    if(json){
      const rec=JSON.parse(json);
      rec.source='ai';
      localStorage.setItem(cacheKey,JSON.stringify(rec));
      return rec;
    }
  }catch(e){console.warn('AI rec failed',e)}
  return ruleRec;
}

const PHASES={1:{name:'Foundation',weeks:'1-4'},2:{name:'Build',weeks:'5-12'},3:{name:'Sustain',weeks:'13+'}};

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowIso(){return new Date().toISOString()}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function fmtDateLong(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}
function fmtDateTime(iso){if(!iso)return'';return new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function daysAgo(iso){const a=new Date(iso+'T00:00:00'),b=new Date(today()+'T00:00:00');return Math.round((b-a)/86400000)}
function fmtMinSec(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function dayOfWeek(d=new Date()){const js=d.getDay();return js===0?6:js-1}
function currentPhase(){if(!state.config.startDate)return 1;const days=Math.floor((Date.now()-new Date(state.config.startDate).getTime())/86400000);const w=Math.floor(days/7)+1;return w<=4?1:w<=12?2:3}
function currentWeek(){if(!state.config.startDate)return 1;const days=Math.floor((Date.now()-new Date(state.config.startDate).getTime())/86400000);return Math.floor(days/7)+1}
function todaySchedule(){const p=currentPhase();const t=WEEKLY_TEMPLATE[p>=2?2:1];return t[dayOfWeek()]}
function isConfigured(){return state.config.githubOwner&&state.config.githubRepo&&state.config.githubToken}
function hasClaudeKey(){return!!state.config.claudeApiKey}

function toast(msg,type=''){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}

function loadLocal(){try{const c=localStorage.getItem(STORAGE_KEY);if(c){const p=JSON.parse(c);Object.assign(state.config,p.config||{});Object.assign(state.profile,p.profile||{})}}catch(e){}try{const d=localStorage.getItem(DATA_KEY);if(d){const p=JSON.parse(d);state.data=Object.assign(state.data,p.data||{});state.dataSha=p.sha||null}}catch(e){}}
function saveLocalConfig(){localStorage.setItem(STORAGE_KEY,JSON.stringify({config:state.config,profile:state.profile}))}
function saveLocalData(){localStorage.setItem(DATA_KEY,JSON.stringify({data:state.data,sha:state.dataSha}))}

async function ghRequest(method,path,body){
  const url=`https://api.github.com/repos/${state.config.githubOwner}/${state.config.githubRepo}/${path}`;
  const res=await fetch(url,{method,headers:{'Authorization':`Bearer ${state.config.githubToken}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(body?{'Content-Type':'application/json'}:{})},body:body?JSON.stringify(body):undefined});
  if(res.status===404)return{notFound:true};
  if(!res.ok){const txt=await res.text();throw new Error(`GitHub ${res.status}: ${txt.slice(0,180)}`)}
  return res.json();
}
function b64enc(s){return btoa(unescape(encodeURIComponent(s)))}
function b64dec(s){try{return decodeURIComponent(escape(atob(s.replace(/\s/g,''))))}catch(e){return''}}
async function ghGetFile(path){const b=state.config.branch||'main';return ghRequest('GET',`contents/${encodeURIComponent(path).replace(/%2F/g,'/')}?ref=${b}`)}
async function ghPutFile(path,c,m,sha){const b=state.config.branch||'main';const body={message:m,content:c,branch:b};if(sha)body.sha=sha;return ghRequest('PUT',`contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,body)}
async function pullData(){if(!isConfigured())throw new Error('Not configured');state.isSyncing=true;try{const r=await ghGetFile('data/log.json');if(r.notFound){state.dataSha=null}else{const parsed=JSON.parse(b64dec(r.content));state.data=Object.assign(state.data,parsed);state.dataSha=r.sha}saveLocalData();state.lastSyncOk=nowIso()}finally{state.isSyncing=false}}
async function pushData(){if(!isConfigured())throw new Error('Not configured');state.isSyncing=true;try{const c=b64enc(JSON.stringify(state.data,null,2));const r=await ghPutFile('data/log.json',c,`update ${today()}`,state.dataSha);state.dataSha=r.content.sha;saveLocalData();state.lastSyncOk=nowIso()}finally{state.isSyncing=false}}
async function uploadPhoto(d,du){const b64=du.split(',')[1];const path=`data/photos/${d}.jpg`;let sha=null;try{const e=await ghGetFile(path);if(e&&!e.notFound)sha=e.sha}catch(e){}await ghPutFile(path,b64,`photo ${d}`,sha);return path}
async function downloadPhoto(p){try{const r=await ghGetFile(p);if(r.notFound)return null;return'data:image/jpeg;base64,'+r.content.replace(/\s/g,'')}catch(e){return null}}

function compressImage(file,maxDim=1080,q=0.82){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim}else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim}const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.onerror=rej;img.src=e.target.result};r.onerror=rej;r.readAsDataURL(file)})}

const IS_NATIVE=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
async function nativeHaptic(t='light'){if(IS_NATIVE){try{await window.Capacitor.Plugins.Haptics.impact({style:t.toUpperCase()});return}catch(e){}}if(navigator.vibrate)navigator.vibrate(t==='heavy'?200:50)}

function releaseScreen(){if(wakeLock){wakeLock.release();wakeLock=null}}

let audioCtx=null;
function beep(freq=800,dur=120){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.2,audioCtx.currentTime+0.01);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur/1000);o.start();o.stop(audioCtx.currentTime+dur/1000)}catch(e){}}

function weightStats(){
  const ents=Object.entries(state.data.entries).filter(([d,e])=>typeof e.weight==='number').sort((a,b)=>a[0].localeCompare(b[0]));
  if(ents.length===0)return null;
  const avg=a=>a.reduce((s,x)=>s+x,0)/a.length;
  const l7=ents.slice(-7).map(e=>e[1].weight),p7=ents.slice(-14,-7).map(e=>e[1].weight);
  const avgNow=l7.length?avg(l7):null,avgPrev=p7.length?avg(p7):null;
  const latest=ents[ents.length-1],first=ents[0];
  return{latest:latest[1].weight,latestDate:latest[0],first:first[1].weight,firstDate:first[0],totalChange:latest[1].weight-first[1].weight,avgNow,avgPrev,weekChange:(avgNow!==null&&avgPrev!==null)?avgNow-avgPrev:null,points:ents.map(([d,e])=>({x:d,y:e.weight}))};
}
function calcStreak(){let s=0,d=new Date(today()+'T00:00:00'),first=true;while(true){const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(state.data.entries[iso]){s++;d.setDate(d.getDate()-1)}else{if(first&&iso===today()){d.setDate(d.getDate()-1);first=false;continue}break}first=false}return s}
function suppStreak(){let s=0,d=new Date(today()+'T00:00:00');while(true){const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const sup=state.data.supplements[iso];if(sup&&SUPPLEMENTS.every(x=>sup[x.id])){s++;d.setDate(d.getDate()-1)}else break}return s}
function todaySuppCount(){const s=state.data.supplements[today()]||{};return SUPPLEMENTS.filter(x=>s[x.id]).length}

function setStatusTime(){const t=document.getElementById('status-time');if(!t)return;const d=new Date();t.textContent=`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`}

const SCREENS_WITH_NAV=new Set(['today','progress','history','settings']);
function setScreen(name,params={}){state.screen=name;state.draft={};Object.assign(state,params);render();document.getElementById('main')?.scrollTo?.(0,0)}

function renderBottomNav(){
  const c=document.getElementById('bottom-nav-container');
  if(!isConfigured()||state.workoutSession||state.runSession||!SCREENS_WITH_NAV.has(state.screen)){c.innerHTML='';return}
  const tabs=[{id:'today',l:'Today',i:ICONS.today},{id:'progress',l:'Progress',i:ICONS.progress},{id:'history',l:'History',i:ICONS.history},{id:'settings',l:'Settings',i:ICONS.settings}];
  c.innerHTML=`<nav class="bnav">${tabs.map(t=>`<button class="tab ${state.screen===t.id?'active':''}" data-s="${t.id}"><div class="ic">${t.i}</div><div class="lbl">${t.l}</div></button>`).join('')}</nav>`;
  c.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setScreen(b.dataset.s)));
}

function render(){
  const m=document.getElementById('main');
  m.className=SCREENS_WITH_NAV.has(state.screen)?'with-nav':'';
  if(!isConfigured()&&!['welcome','onboarding','settings'].includes(state.screen)){m.innerHTML=renderWelcome();bindWelcome();renderBottomNav();return}
  const renderers={welcome:[renderWelcome,bindWelcome],onboarding:[renderOnboarding,bindOnboarding],today:[renderToday,bindToday],progress:[renderProgress,bindProgress],history:[renderHistory,bindHistory],settings:[renderSettings,bindSettings],logEntry:[renderLogEntry,bindLogEntry],workout:[renderWorkout,bindWorkout],session:[renderSession,bindSession],rest:[renderRest,bindRest],complete:[renderComplete,bindComplete],c25k:[renderC25K,bindC25K],coach:[renderCoach,bindCoach],logRun:[renderLogRun,bindLogRun],supplements:[renderSupplements,bindSupplements]};
  const [r,b]=renderers[state.screen]||[()=>'<div class="empty"><h3>404</h3></div>',()=>{}];
  m.innerHTML=r();b();
  renderBottomNav();
}

function renderOnboarding(){

  if(step===1)body=`<h1 class="pt">What should we call you?</h1><p class="muted mb-4">First name is enough.</p><div class="field"><input type="text" id="onb-name" value="${escapeHtml(p.name)}" placeholder="e.g. Vedant"></div>`;

function bindOnboarding(){
  const step=state.draft.onbStep||1;
  const set=n=>{state.draft.onbStep=n;render()};
  document.getElementById('onb-back')?.addEventListener('click',()=>set(step-1));
  document.getElementById('onb-next')?.addEventListener('click',()=>{
    const p=state.draft.profile||{...state.profile};
    if(step===1)p.name=document.getElementById('onb-name').value.trim();
    if(step===2){p.age=parseInt(document.getElementById('onb-age').value,10)||p.age;p.heightCm=parseInt(document.getElementById('onb-height').value,10)||p.heightCm;p.startWeight=parseFloat(document.getElementById('onb-weight').value)||p.startWeight}
    if(step===3){p.goalWeight=parseFloat(document.getElementById('onb-gw').value)||p.goalWeight;p.goalDate=document.getElementById('onb-gd').value}
    state.draft.profile=p;set(step+1);
  });
  document.getElementById('onb-finish')?.addEventListener('click',async()=>{
    state.config.githubOwner=document.getElementById('onb-u').value.trim();
    state.config.githubRepo=document.getElementById('onb-r').value.trim();
    state.config.githubToken=document.getElementById('onb-t').value.trim();
    if(state.draft.profile)Object.assign(state.profile,state.draft.profile);
    if(!state.config.startDate)state.config.startDate=today();
    saveLocalConfig();
    if(!isConfigured()){toast('Fill GitHub credentials','error');return}
    const btn=document.getElementById('onb-finish');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Connecting…';
    try{await pullData();toast('Connected ✓','success');setScreen('today')}catch(e){toast('Saved, but sync failed: '+e.message,'error');setScreen('today')}
  });
}

      const entry={};

function computeAdjustments(routine,rpe){
  if(!rpe)return[];const props=[];
  for(const ex of routine.exercises){
    const adj=state.data.adjustments[ex.id]||{};
    const reps=adj.targetReps||ex.defaultReps;
    const vi=ex.variants.indexOf(adj.variant||ex.variants[0]);
    if(rpe===1){
      const e=(adj.easyStreak||0)+1;
      if(e>=2&&vi<ex.variants.length-1)props.push(`${ex.name}: progress to ${ex.variants[vi+1]} variant`);
      else props.push(`${ex.name}: ${reps} → ${reps+1}${ex.unit==='sec'?' sec':' reps'}`);
    }else if(rpe===2){
      const j=(adj.justRightStreak||0)+1;
      if(j>=2)props.push(`${ex.name}: ${reps} → ${reps+1}${ex.unit==='sec'?' sec':' reps'}`);
    }else if(rpe===3){
      const h=(adj.hardStreak||0)+1;
      if(h>=2&&vi>0)props.push(`${ex.name}: regress to ${ex.variants[vi-1]} variant`);
      else if(reps>1)props.push(`${ex.name}: ${reps} → ${reps-1}${ex.unit==='sec'?' sec':' reps'}`);
    }
  }
  return props;
}
function applyAdjustments(routine,rpe){
  for(const ex of routine.exercises){
    const adj=state.data.adjustments[ex.id]||{};
    const reps=adj.targetReps||ex.defaultReps;
    const vi=ex.variants.indexOf(adj.variant||ex.variants[0]);
    if(rpe===1){
      adj.easyStreak=(adj.easyStreak||0)+1;adj.justRightStreak=0;adj.hardStreak=0;
      if(adj.easyStreak>=2&&vi<ex.variants.length-1){adj.variant=ex.variants[vi+1];adj.targetReps=ex.defaultReps;adj.easyStreak=0}
      else adj.targetReps=reps+1;
    }else if(rpe===2){
      adj.justRightStreak=(adj.justRightStreak||0)+1;adj.easyStreak=0;adj.hardStreak=0;
      if(adj.justRightStreak>=2){adj.targetReps=reps+1;adj.justRightStreak=0}
    }else if(rpe===3){
      adj.hardStreak=(adj.hardStreak||0)+1;adj.easyStreak=0;adj.justRightStreak=0;
      if(adj.hardStreak>=2&&vi>0){adj.variant=ex.variants[vi-1];adj.targetReps=ex.defaultReps;adj.hardStreak=0}
      else if(reps>1)adj.targetReps=reps-1;
    }
    state.data.adjustments[ex.id]=adj;
  }
}

async function callClaude(messages,sys,maxTok=1500){
  if(!state.config.claudeApiKey)throw new Error('No Claude API key');
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.config.claudeApiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},body:JSON.stringify({model:state.config.claudeModel||'claude-sonnet-4-6',max_tokens:maxTok,system:sys,messages})});
  if(!res.ok){const t=await res.text();throw new Error(`Claude ${res.status}: ${t.slice(0,200)}`)}
  const d=await res.json();return d.content?.[0]?.text||'';
}

${expanded===f.id?`<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">${(f.portions||[{n:'100g',g:100}]).map((p,pi)=>{const kcal=Math.round(f.kcal*p.g/100),prot=(f.protein*p.g/100).toFixed(1);return `<button class="fp-port" data-fid="${f.id}" data-pi="${pi}" data-g="${p.g}" data-kcal="${kcal}" data-prot="${prot}" style="background:var(--surface-cream);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px"><span style="font-weight:600">${escapeHtml(p.n)}</span><span class="muted">+${kcal} kcal · ${prot}g P</span></button>`}).join('')}</div>`:''}
</div>`).join('')}
${filtered.length===0?'<div class="empty" style="padding:30px"><p>No foods found</p></div>':''}
</div>
<button class="btn btn-secondary btn-full mt-2" id="fp-custom">+ Add custom food</button>
</div>`;
    modal.querySelector('#fp-q').addEventListener('input',e=>{query=e.target.value;render2();modal.querySelector('#fp-q').focus()});
    modal.querySelector('#fp-x').addEventListener('click',()=>modal.remove());
    modal.querySelectorAll('.chip[data-c]').forEach(c=>c.addEventListener('click',()=>{cat=c.dataset.c;render2()}));
    modal.querySelectorAll('.fp-food').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('.fp-port'))return;expanded=expanded===el.dataset.id?null:el.dataset.id;render2()}));
    modal.querySelectorAll('.fp-port').forEach(b=>b.addEventListener('click',()=>{
      const f=[...DB.foods.foods,...(state.data.customFoods||[])].find(x=>x.id===b.dataset.fid);
      const p=f.portions[parseInt(b.dataset.pi,10)];
      onPick({foodId:f.id,name:f.name,portionName:p.n,grams:p.g,kcal:parseInt(b.dataset.kcal,10),protein:parseFloat(b.dataset.prot)});
      modal.remove();
    }));
    modal.querySelector('#fp-custom').addEventListener('click',()=>{
      openCustomFood(food=>{state.data.customFoods=state.data.customFoods||[];state.data.customFoods.push(food);saveLocalData();expanded=food.id;render2()});
    });
  };
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove()});
  document.body.appendChild(modal);
  render2();
  setTimeout(()=>modal.querySelector('#fp-q')?.focus(),100);
}
function openCustomFood(onSave){
  const modal=document.createElement('div');modal.className='modal-bg';
  modal.innerHTML=`<div class="modal"><div class="modal-handle"></div>
<h2 style="font-size:20px;font-weight:700;margin-bottom:14px">Add a custom food</h2>
<div class="field"><div class="flabel">Name</div><input type="text" id="cf-n" placeholder="e.g. Mom's dal"></div>
<div class="grid-2">
<div class="field"><div class="flabel">Calories per 100g</div><input type="number" id="cf-k" inputmode="numeric" placeholder="150"></div>
<div class="field"><div class="flabel">Protein per 100g</div><input type="number" step="0.1" id="cf-p" inputmode="decimal" placeholder="8"></div>
</div>
<div class="field"><div class="flabel">Common portion name</div><input type="text" id="cf-pn" placeholder="1 katori (150g)"></div>
<div class="field"><div class="flabel">Common portion grams</div><input type="number" id="cf-pg" inputmode="numeric" placeholder="150"></div>
<div class="btn-row"><button class="btn btn-secondary" id="cf-x">Cancel</button><button class="btn btn-primary" id="cf-save">Save</button></div>
</div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove()});
  modal.querySelector('#cf-x').addEventListener('click',()=>modal.remove());
  modal.querySelector('#cf-save').addEventListener('click',()=>{
    const n=modal.querySelector('#cf-n').value.trim();
    const k=parseFloat(modal.querySelector('#cf-k').value);
    const p=parseFloat(modal.querySelector('#cf-p').value);
    const pn=modal.querySelector('#cf-pn').value.trim()||'100g';
    const pg=parseInt(modal.querySelector('#cf-pg').value,10)||100;
    if(!n||!k){toast('Name + kcal required','error');return}
    const id='c-'+Date.now();
    onSave({id,name:n,category:'other',kcal:k,protein:p||0,carbs:0,fat:0,portions:[{n:pn,g:pg},{n:'100g',g:100}]});
    modal.remove();
  });
  document.body.appendChild(modal);
}

loadLocal();
if(isConfigured())state.screen='today';else state.screen='welcome';
setStatusTime();setInterval(setStatusTime,30000);
render();
loadAllDB().then(()=>render());
if(isConfigured())pullData().then(()=>render()).catch(e=>console.warn('boot sync failed',e));
</script>
