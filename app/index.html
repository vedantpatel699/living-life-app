<style>
:root{--surface-outer:#E6EFF6;--surface-cream:#FAF6EE;--surface-white:#FFFFFF;--surface-sky:#E0EBF4;--ink:#1A1F2E;--muted:#7C8497;--faint:#B7BCC9;--coral:#ED7A4D;--coral-s:#F8D9C9;--sky:#6DA9D6;--sky-s:#D2E2EF;--sun:#F2C84B;--sun-s:#FBEBB6;--mint:#8CCB9C;--mint-s:#D5EBDA;--cta:#0F0F12;--border:#D9DFE6;--border-l:#E8EBF0;--success:#4DA869;--success-s:#E8F3EC;--strava:#FC5200;--danger:#E26060;--r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;--sh-card:0 2px 12px rgba(26,31,46,0.04);--sh-elev:0 8px 24px rgba(26,31,46,0.08);--sh-up:0 -4px 16px rgba(26,31,46,0.05)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior-y:contain}
body{font-family:'Sora',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--surface-outer);color:var(--ink);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}
input,textarea,button,select{font-family:inherit;color:inherit}

#root{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--surface-cream)}
.status-bar{height:50px;padding:max(16px,env(safe-area-inset-top)) 24px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}

.top-bar{display:flex;align-items:center;gap:14px;padding:14px 20px 8px;flex-shrink:0}

.text-center{text-align:center}.text-right{text-align:right}
.flex{display:flex}.flex-1{flex:1}.gap-2{gap:8px}.gap-3{gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

<script>
'use strict';
const STORAGE_KEY='living-life-config-v2',DATA_KEY='living-life-data-v2',APP_VERSION='2.0.0';
const ACTIVITIES=['Walk','Strength workout','Run','Yoga / stretch','Amazon shift','Rest day'];
const SUPPLEMENTS=[
  {id:'creatine',name:'Creatine monohydrate',dose:'5 g',timing:'anytime',color:'coral',ini:'C'},
  {id:'whey',name:'Whey protein',dose:'25-50 g',timing:'post-workout / breakfast',color:'sun',ini:'W'},
  {id:'d3',name:'Vitamin D3',dose:'2000 IU',timing:'with breakfast (fat)',color:'sky',ini:'D'},
  {id:'b12',name:'Methylcobalamin B12',dose:'500 µg',timing:'sublingual, anytime',color:'mint',ini:'B'},
  {id:'omega3',name:'Algal omega-3',dose:'500 mg EPA+DHA',timing:'with breakfast',color:'sky',ini:'O'},
];

// =================== DATABASE LOADERS ===================
const DB_BASE='https://raw.githubusercontent.com/vedantpatel699/living-life-app/main/data/';
const DB={foods:null,supplements:null,foodsBySlug:{},_loading:{},_err:{}};
function loadDB(name){
  if(DB[name])return Promise.resolve(DB[name]);
  if(DB._loading[name])return DB._loading[name];
  DB._loading[name]=(async()=>{
    try{
      const r=await fetch(DB_BASE+name+'.json',{cache:'no-cache'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      DB[name]=await r.json();
      DB._err[name]=null;
      if(name==='foods'){DB.foodsBySlug={};for(const f of DB.foods.foods){DB.foodsBySlug[f.id]=f}}
      return DB[name];
    }catch(e){console.warn('DB load',name,e);DB._err[name]=e.message||String(e);return null}
    finally{delete DB._loading[name]}
  })();
  return DB._loading[name];
}
async function loadAllDB(){await Promise.all(['foods','supplements'].map(loadDB))}

// Today's supplement schedule — picks shift schedule on shift days, daily schedule otherwise.
// A "training day" = a shift day OR a day where Health Connect logged a workout.
function todaySuppSchedule(){
  if(!DB.supplements)return null;
  const shift=isShiftDay();
  const hc=getHCToday()||{};
  const hcWorkouts=(hc.workouts||[]);
  const isTrainingDay=shift||hcWorkouts.length>0;
  const isRunDay=hcWorkouts.some(w=>{const t=(w.type||w.title||'').toLowerCase();return t.includes('run')||t.includes('jog')||t.includes('c25k')});
  // On shift days, prefer shiftSchedule if defined
  const source=(shift&&DB.supplements.shiftSchedule)?DB.supplements.shiftSchedule:DB.supplements.dailySchedule;
  const slots=source.map(slot=>{
    const items=slot.include.map(id=>{
      const s=DB.supplements.supplements.find(x=>x.id===id);
      if(!s)return null;
      // Electrolytes only on actual workout/run days
      if(s.id==='electrolytes'&&!isTrainingDay)return null;
      if(s.frequency==='training-days-only'&&!isTrainingDay)return null;
      if(s.frequency==='run-days-only'&&!isRunDay)return null;
      return s;
    }).filter(Boolean);
    if(slot.conditional==='training-day'&&!isTrainingDay)return null;
    if(slot.conditional==='workout-day'&&!isTrainingDay)return null;
    if(items.length===0)return null;
    return{...slot,items};
  }).filter(Boolean);
  return slots;
}

const ICONS={
  today:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',
  progress:'<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',

  settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
};
const colorMap={coral:'var(--coral)',mint:'var(--mint)',sky:'var(--sky)',sun:'var(--sun)'};
const softMap={coral:'var(--coral-s)',mint:'var(--mint-s)',sky:'var(--sky-s)',sun:'var(--sun-s)'};

const state={
  screen:'welcome',
  config:{githubOwner:'vedantpatel699',githubRepo:'living-life-data',githubToken:'',branch:'main',claudeApiKey:'',claudeModel:'claude-sonnet-4-6',stravaToken:'',startDate:null},
  profile:{name:'',age:28,heightCm:167,sex:'male',startWeight:78,goalWeight:70,goalDate:'',shiftDays:[]},
  data:{version:3,entries:{},supplements:{},coachConversation:[],weeklyReflections:[],customFoods:[],healthMarkers:[],gpReviewLog:[],lipomaLog:[],mealTemplates:[],frequencyPattern:{}},
  dataSha:null,draft:{},isSyncing:false,lastSyncOk:null,
};

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowIso(){return new Date().toISOString()}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function fmtDateLong(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}
function fmtDateTime(iso){if(!iso)return'';return new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function daysAgo(iso){const a=new Date(iso+'T00:00:00'),b=new Date(today()+'T00:00:00');return Math.round((b-a)/86400000)}
function fmtMinSec(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

// =================== GOOGLE-FIT-STYLE COMPONENTS ===================
function gfRing({value=0,goal=10000,label='',sub='',size=200,color='var(--coral)',track='var(--surface-cream)',thick=14,centerLabel=''}){
  const r=(size-thick)/2,c=size/2;
  const circ=2*Math.PI*r;
  const pct=Math.min(1,goal>0?value/goal:0);
  const dash=circ*pct;
  const num=value>=10000?(value/1000).toFixed(1)+'k':Math.round(value).toLocaleString();
  return `<div class="gf-ring-wrap" style="width:${size}px;height:${size}px">
<svg viewBox="0 0 ${size} ${size}" style="position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)">
<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${track}" stroke-width="${thick}"/>
<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${thick}" stroke-linecap="round" stroke-dasharray="${dash} ${circ}" style="transition:stroke-dasharray 0.6s ease-out"/>
</svg>
<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 16px">
<div class="gf-ring-num">${num}</div>
${centerLabel?`<div class="gf-ring-label">${centerLabel}</div>`:''}
${label?`<div class="gf-ring-sub">${label}</div>`:''}
${sub?`<div class="gf-ring-sub" style="margin-top:2px">${sub}</div>`:''}
</div>
</div>`;
}
function gfTile({icon='',label='',value='',unit='',sub='',color='var(--ink)',bg=null}){
  const bgStyle=bg?`background:${bg};`:'';

async function ghRequest(method,path,body){
  const url=`https://api.github.com/repos/${state.config.githubOwner}/${state.config.githubRepo}/${path}`;
  const res=await fetch(url,{method,headers:{'Authorization':`Bearer ${state.config.githubToken}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(body?{'Content-Type':'application/json'}:{})},body:body?JSON.stringify(body):undefined});
  if(res.status===404)return{notFound:true};
  if(!res.ok){const txt=await res.text();throw new Error(`GitHub ${res.status}: ${txt.slice(0,180)}`)}
  return res.json();
}

async function ghPutFile(path,c,m,sha){const b=state.config.branch||'main';const body={message:m,content:c,branch:b};if(sha)body.sha=sha;return ghRequest('PUT',`contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,body)}

function compressImage(file,maxDim=1080,q=0.82){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim}else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim}const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.onerror=rej;img.src=e.target.result};r.onerror=rej;r.readAsDataURL(file)})}

function weightStats(){
  const ents=Object.entries(state.data.entries).filter(([d,e])=>typeof e.weight==='number').sort((a,b)=>a[0].localeCompare(b[0]));
  if(ents.length===0)return null;
  const avg=a=>a.reduce((s,x)=>s+x,0)/a.length;
  const l7=ents.slice(-7).map(e=>e[1].weight),p7=ents.slice(-14,-7).map(e=>e[1].weight);
  const avgNow=l7.length?avg(l7):null,avgPrev=p7.length?avg(p7):null;
  const latest=ents[ents.length-1],first=ents[0];
  return{latest:latest[1].weight,latestDate:latest[0],first:first[1].weight,firstDate:first[0],totalChange:latest[1].weight-first[1].weight,avgNow,avgPrev,weekChange:(avgNow!==null&&avgPrev!==null)?avgNow-avgPrev:null,points:ents.map(([d,e])=>({x:d,y:e.weight}))};
}

function addWaterEntry(ml){
  if(!ml||ml<=0)return;
  const t=today();
  const e=state.data.entries[t]||{};
  e.foods=e.foods||[];
  // Calgary Tap Water nutrient profile per 100g (= 100ml)
  const W={kcal:0,protein:0,carbs:0,fat:0,sodium_mg:2,potassium_mg:1,calcium_mg:56,magnesium_mg:16};
  const f=ml/100;
  const portionName=ml===250?'1 glass (250ml)':ml===500?'1 bottle (500ml)':ml===240?'1 cup (240ml)':ml===1000?'1 liter (1000ml)':ml+'ml (custom)';
  e.foods.push({foodId:'calgary-tap-water',name:'Calgary Tap Water',portionName,grams:ml,kcal:0,protein:0,carbs:0,fat:0,sodium_mg:+(W.sodium_mg*f).toFixed(2),potassium_mg:+(W.potassium_mg*f).toFixed(2),calcium_mg:+(W.calcium_mg*f).toFixed(1),magnesium_mg:+(W.magnesium_mg*f).toFixed(1)});
  e.updatedAt=nowIso();
  state.data.entries[t]=e;
  saveLocalData();
  nativeHaptic('light');
  render();
  // Best-effort background syncs (don't block UI)
  pushData().catch(err=>console.warn('water sync',err));
  writeHydrationToHC(ml,t).catch(()=>{});
}
function undoLastWater(){
  const t=today();
  const e=state.data.entries[t];
  if(!e||!e.foods)return;
  for(let i=e.foods.length-1;i>=0;i--){
    if(e.foods[i].foodId==='calgary-tap-water'){e.foods.splice(i,1);break}
  }
  if(e.foods.length===0)delete e.foods;
  e.updatedAt=nowIso();
  saveLocalData();
  nativeHaptic('light');
  render();
  pushData().catch(err=>console.warn('water sync',err));
}

  m.addEventListener('click',ev=>{if(ev.target===m)m.remove()});

    const d=c.dataset.day;
    state.profile.shiftDays=state.profile.shiftDays||[];
    const i=state.profile.shiftDays.indexOf(d);
    if(i>=0)state.profile.shiftDays.splice(i,1);
    else state.profile.shiftDays.push(d);
    saveLocalConfig();
    c.classList.toggle('selected');
  }));
  document.getElementById('s-save')?.addEventListener('click',async()=>{state.config.githubOwner=document.getElementById('s-u').value.trim();state.config.githubRepo=document.getElementById('s-r').value.trim();state.config.githubToken=document.getElementById('s-t').value.trim();saveLocalConfig();toast('Saved','success');if(isConfigured()){try{await pullData();toast('Connected ✓','success');render()}catch(e){toast('Saved but sync failed: '+e.message,'error')}}});
  document.getElementById('s-test')?.addEventListener('click',async()=>{const o=document.getElementById('s-u').value.trim(),r=document.getElementById('s-r').value.trim(),t=document.getElementById('s-t').value.trim();if(!o||!r||!t){toast('Fill all fields','error');return}try{const res=await fetch(`https://api.github.com/repos/${o}/${r}`,{headers:{'Authorization':`Bearer ${t}`,'Accept':'application/vnd.github+json'}});if(res.ok){const j=await res.json();toast('✓ '+j.full_name,'success')}else{toast('Error '+res.status,'error')}}catch(e){toast('Network error','error')}});
  document.getElementById('s-csave')?.addEventListener('click',()=>{state.config.claudeApiKey=document.getElementById('s-ck').value.trim();saveLocalConfig();toast('Claude key saved','success');render()});
  document.getElementById('s-pull')?.addEventListener('click',async()=>{try{await pullData();toast('Synced ✓','success');render()}catch(e){toast('Sync failed: '+e.message,'error')}});
  document.getElementById('s-exp')?.addEventListener('click',()=>{const b=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`living-life-${today()}.json`;a.click();URL.revokeObjectURL(u)});
  document.getElementById('s-hcsync')?.addEventListener('click',async()=>{const btn=document.getElementById('s-hcsync');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Syncing…';const hc=await syncHealthConnect();btn.disabled=false;btn.textContent='↻ Sync Health Connect (today)';if(hc){toast('Synced ✓ · '+Object.keys(hc.available||{}).length+' data types','success');render()}else toast('Not available (need Android app)','error')});
  document.getElementById('s-hcbackfill')?.addEventListener('click',async()=>{const btn=document.getElementById('s-hcbackfill');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Backfilling 7 days…';const r=await syncHealthConnectRange(7);btn.disabled=false;btn.textContent='↻↻ Backfill last 7 days';toast(`Backfilled ${r.synced}/7 days · ${r.failed} skipped`, r.synced>0?'success':'error');render()});
  document.getElementById('gp-add')?.addEventListener('click',()=>openGpReviewModal());
  document.getElementById('gp-history')?.addEventListener('click',()=>{
    const log=state.data.gpReviewLog||[];
    const m=document.createElement('div');m.className='modal-bg';
    m.innerHTML=`<div class="modal" style="max-width:480px;max-height:90dvh;overflow-y:auto"><div class="modal-handle"></div>

    ${log.slice().reverse().map(e=>`<div class="card-flat" style="padding:10px 12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-weight:700;font-size:13px">${fmtDate(e.date)}</div><div class="tiny muted">${daysAgo(e.date)}d ago</div></div>
      <div class="tiny muted" style="line-height:1.6">${[e.dose_mg&&e.dose_mg+'mg',e.mood_rating,e.sexual_function&&'Sex: '+e.sexual_function,e.agency].filter(Boolean).join(' · ')}</div>
      ${e.side_effects?`<div class="tiny" style="margin-top:6px;white-space:pre-wrap;font-style:italic">${escapeHtml(e.side_effects)}</div>`:''}
      ${e.notes?`<div class="tiny" style="margin-top:6px;white-space:pre-wrap">${escapeHtml(e.notes)}</div>`:''}
      ${e.next_appointment?`<div class="tiny" style="margin-top:6px;color:var(--sky)">Next appt: ${fmtDate(e.next_appointment)}</div>`:''}
    </div>`).join('')}
    </div>
    <button class="btn btn-secondary btn-full mt-4" id="gph-close">Close</button>
    </div>`;
    m.addEventListener('click',ev=>{if(ev.target===m)m.remove()});

  });
  document.getElementById('s-diag-test')?.addEventListener('click',async()=>{
    const lines=[];
    lines.push('Capacitor: '+(window.Capacitor?'present':'MISSING'));
    lines.push('IS_NATIVE: '+IS_NATIVE);
    lines.push('Platform: '+(window.Capacitor?.getPlatform?.()||'none'));
    lines.push('Plugins: '+Object.keys(window.Capacitor?.Plugins||{}).join(', '));

      lines.push('HC methods: '+Object.keys(HC).filter(k=>typeof HC[k]==='function').slice(0,10).join(', '));
      try{const a=await(HC.isHealthAvailable?.());lines.push('isHealthAvailable: '+JSON.stringify(a))}catch(e){lines.push('isHealthAvailable err: '+e.message)}

  });
  document.getElementById('s-refresh')?.addEventListener('click',async()=>{Object.assign(DB,{foods:null,supplements:null});await loadAllDB();const failed=Object.entries(DB._err||{}).filter(([k,v])=>v);if(failed.length===0)toast('Databases refreshed ✓','success');else toast('Some failed: '+failed.map(([k])=>k).join(', '),'error');render()});
  document.getElementById('s-clear')?.addEventListener('click',()=>{if(confirm('Clear local cache?')){localStorage.removeItem(DATA_KEY);state.data={version:3,entries:{},supplements:{},coachConversation:[],weeklyReflections:[],customFoods:[],healthMarkers:[],gpReviewLog:[],lipomaLog:[],mealTemplates:[],frequencyPattern:{}};state.dataSha=null;toast('Cleared');render()}});
}

function bindLogEntry(){
  const d=state.draft.le;
  const editDate=state.editingDate||today();
  document.getElementById('le-back')?.addEventListener('click',()=>{state.editingDate=null;state.draft={};setScreen(editDate===today()?'today':'history')});
  document.getElementById('le-w')?.addEventListener('input',e=>d.weight=e.target.value===''?'':parseFloat(e.target.value));
  document.getElementById('le-m')?.addEventListener('input',e=>d.meals=e.target.value);
  document.getElementById('le-addfood')?.addEventListener('click',()=>openFoodPicker(f=>{d.foods=d.foods||[];d.foods.push(f);render()}));
  document.querySelectorAll('.le-fdel').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const i=parseInt(b.dataset.i,10);d.foods.splice(i,1);render()}));
  document.querySelectorAll('.le-fedit').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const i=parseInt(b.dataset.i,10);openEditFoodGrams(d.foods[i],updated=>{d.foods[i]=updated;render()})}));
  document.getElementById('le-n')?.addEventListener('input',e=>d.notes=e.target.value);
  document.getElementById('le-sl')?.addEventListener('input',e=>d.sleep=e.target.value?parseFloat(e.target.value):null);
  document.getElementById('le-st')?.addEventListener('input',e=>d.steps=e.target.value?parseInt(e.target.value,10):null);
  document.getElementById('le-ph-wrap')?.addEventListener('click',async()=>{
    // Try camera overlay first
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
      openCameraOverlay(dataUrl=>{d.photoDataUrl=dataUrl;render()});
    }else{
      document.getElementById('le-ph')?.click();
    }
  });
  document.getElementById('le-ph')?.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;toast('Compressing…');try{d.photoDataUrl=await compressImage(f);render()}catch(err){toast('Photo error: '+err.message,'error')}});
  document.querySelectorAll('#le-acts .chip').forEach(c=>c.addEventListener('click',()=>{const a=c.dataset.a;const i=d.activities.indexOf(a);if(i>=0)d.activities.splice(i,1);else d.activities.push(a);c.classList.toggle('selected')}));
  document.querySelectorAll('#le-en .ebtn').forEach(b=>b.addEventListener('click',()=>{d.energy=parseInt(b.dataset.n,10);render()}));
  document.getElementById('le-save')?.addEventListener('click',async()=>{
    const btn=document.getElementById('le-save');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saving…';
    const saveDate=state.editingDate||today();
    const isEdit=saveDate!==today();
    try{
      // Preserve hc + run + other server-only fields that weren't surfaced in the UI
      const orig=state.data.entries[saveDate]||{};
      let pp=d.photoPath;if(d.photoDataUrl)pp=await uploadPhoto(saveDate,d.photoDataUrl);
      const entry={};
      if(d.weight!==''&&d.weight!=null&&!isNaN(d.weight))entry.weight=parseFloat(d.weight);
      if(pp)entry.photo=pp;
      if(d.activities.length)entry.activities=d.activities;
      if(d.meals&&d.meals.trim())entry.meals=d.meals.trim();
      if(d.notes&&d.notes.trim())entry.notes=d.notes.trim();
      if(d.energy)entry.energy=d.energy;
      if(d.sleep)entry.sleep=d.sleep;
      if(d.steps)entry.steps=d.steps;
      if(d.foods&&d.foods.length)entry.foods=d.foods;
      // Preserve fields the edit form didn't touch
      ['hc','run','workout'].forEach(k=>{if(orig[k]!==undefined)entry[k]=orig[k]});
      entry.updatedAt=nowIso();
      state.data.entries[saveDate]=entry;
      await pushData();
      // Best-effort: mirror weight to Health Connect so other apps (Garmin, Pixel scale, etc.) see it
      if(entry.weight)writeWeightToHC(entry.weight,saveDate).catch(()=>{});
      toast(isEdit?'Updated ✓':'Saved ✓','success');state.draft={};state.editingDate=null;setScreen(isEdit?'history':'today');
    }catch(e){toast('Save failed: '+e.message,'error');btn.disabled=false;btn.innerHTML='Save & sync'}
  });
}

function openEditFoodGrams(food,onSave){
  const modal=document.createElement('div');modal.className='modal-bg';
  // Re-derive per-100g values from the entry: divide stored values by (grams/100)
  const g0=food.grams||100;
  const per100={kcal:food.kcal/(g0/100),protein:(food.protein||0)/(g0/100)};
  ['carbs','fat','fiber','sat_fat','sugar','sodium_mg','potassium_mg','calcium_mg','iron_mg','magnesium_mg','zinc_mg','vit_a_iu','vit_c_mg','vit_d_iu','vit_b12_ug','folate_ug'].forEach(k=>{if(food[k]!==undefined)per100[k]=food[k]/(g0/100)});
  modal.innerHTML=`<div class="modal" style="max-width:420px"><div class="modal-handle"></div>
<h2 style="font-size:18px;font-weight:700;margin-bottom:4px">Edit grams</h2>
<p class="tiny muted">${escapeHtml(food.name)}</p>
<div class="field mt-4"><div class="flabel">Grams</div><div style="display:flex;align-items:center;gap:10px"><input type="number" id="efg-g" inputmode="decimal" step="1" min="1" value="${g0}" style="font-size:26px;font-weight:700;border:none;background:transparent;padding:0;flex:1"><span class="muted" style="font-size:18px;font-weight:600">g</span></div></div>
<div class="card-flat" id="efg-preview" style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:8px"><div><div class="tiny muted">New values</div><div style="font-weight:700;font-size:16px" id="efg-kcal">${food.kcal} kcal</div></div><div class="tiny muted" id="efg-prot">${(food.protein||0).toFixed(1)} g protein</div></div>
<div class="btn-row mt-4"><button class="btn btn-secondary" id="efg-x">Cancel</button><button class="btn btn-primary" id="efg-save">Save</button></div>
</div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove()});
  const inp=modal.querySelector('#efg-g');
  const updatePreview=()=>{const g=parseFloat(inp.value)||0;const k=Math.round(per100.kcal*g/100);const p=(per100.protein*g/100);modal.querySelector('#efg-kcal').textContent=k+' kcal';modal.querySelector('#efg-prot').textContent=p.toFixed(1)+' g protein'};
  inp.addEventListener('input',updatePreview);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')modal.querySelector('#efg-save').click()});
  modal.querySelector('#efg-x').addEventListener('click',()=>modal.remove());
  modal.querySelector('#efg-save').addEventListener('click',()=>{
    const g=parseFloat(inp.value);
    if(!g||g<=0){toast('Enter grams > 0','error');return}
    const updated={...food,grams:g,portionName:g+'g (custom)',kcal:Math.round(per100.kcal*g/100),protein:+(per100.protein*g/100).toFixed(1)};
    ['carbs','fat','fiber','sat_fat','sugar','sodium_mg','potassium_mg','calcium_mg','iron_mg','magnesium_mg','zinc_mg','vit_a_iu','vit_c_mg','vit_d_iu','vit_b12_ug','folate_ug'].forEach(k=>{if(per100[k]!==undefined)updated[k]=+(per100[k]*g/100).toFixed(2)});
    onSave(updated);
    modal.remove();
  });
  document.body.appendChild(modal);
  setTimeout(()=>{inp.focus();inp.select()},80);
}
async function callClaude(messages,sys,maxTok=1500){
  if(!state.config.claudeApiKey)throw new Error('No Claude API key');
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.config.claudeApiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},body:JSON.stringify({model:state.config.claudeModel||'claude-sonnet-4-6',max_tokens:maxTok,system:sys,messages})});
  if(!res.ok){const t=await res.text();throw new Error(`Claude ${res.status}: ${t.slice(0,200)}`)}
  const d=await res.json();return d.content?.[0]?.text||'';
}

    const t=inp?.value?.trim();if(!t)return;inp.value='';

      render();
    }catch(e){
      state.data.coachConversation.push({role:'assistant',content:`Couldn't reach Claude: ${e.message}\n\nCheck your API key in Settings.`,ts:nowIso()});
      saveLocalData();render();
    }
  };
  document.getElementById('cc-send')?.addEventListener('click',send);

      state.data.entries[today()]=tE;

async function generateReflection(){

async function findPreviousPhotoPath(){
  console.log('[ghost] looking for reference photo…');
  // Priority 1: just-captured photo in the current draft (not yet saved)
  if(state.draft.le&&state.draft.le.photoDataUrl){
    console.log('[ghost] using draft photoDataUrl');
    return{dataUrl:state.draft.le.photoDataUrl,date:today(),label:'just taken'};
  }
  // Priority 2: photoPath on current draft (today's already-uploaded photo)
  if(state.draft.le&&state.draft.le.photoPath){
    console.log('[ghost] using draft photoPath',state.draft.le.photoPath);
    return{path:state.draft.le.photoPath,date:today(),label:'today'};
  }
  const t=today();
  // Priority 3: today's saved entry photo from current state
  const todayEntryNow=state.data.entries[t];
  if(todayEntryNow&&todayEntryNow.photo){
    console.log('[ghost] using state today photo');
    return{path:todayEntryNow.photo,date:t,label:'today'};
  }
  // Priority 4: most recent prior photo from state
  let entries=Object.entries(state.data.entries).filter(([d,e])=>e.photo).sort((a,b)=>b[0].localeCompare(a[0]));
  if(entries.length>0){
    console.log('[ghost] using most-recent state photo',entries[0][0]);
    return{path:entries[0][1].photo,date:entries[0][0],label:entries[0][0]===t?'today':fmtDate(entries[0][0])};
  }
  // Last-ditch: pull from GitHub and re-check
  console.log('[ghost] no local photos, pulling from GitHub…');
  try{if(isConfigured())await pullData()}catch(e){console.warn('pullData failed',e)}
  entries=Object.entries(state.data.entries).filter(([d,e])=>e.photo).sort((a,b)=>b[0].localeCompare(a[0]));
  if(entries.length===0){console.log('[ghost] no photos found anywhere');return null}
  console.log('[ghost] after pull, using',entries[0][0]);
  return{path:entries[0][1].photo,date:entries[0][0],label:entries[0][0]===t?'today':fmtDate(entries[0][0])};
}

</div>`;
  document.body.appendChild(modal);
  const v=modal.querySelector('#cam-v'),overlay=modal.querySelector('#cam-overlay');
  const statusEl=modal.querySelector('#cam-status'),hintEl=modal.querySelector('#cam-hint');
  const msgBox=modal.querySelector('#cam-msg'),msgText=modal.querySelector('#cam-msg-text');
  const controlsRow=modal.querySelector('#cam-controls-row'),toggleBtn=modal.querySelector('#cam-toggle');
  const opSlider=modal.querySelector('#cam-op'),opVal=modal.querySelector('#cam-opv');
  const cleanup=()=>{if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}};
  const startCamera=async()=>{
    cleanup();
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      msgText.textContent='Your browser does not support camera access. Use Gallery instead.';
      return false;
    }
    msgText.textContent='Requesting camera access…';
    msgBox.style.display='flex';
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},audio:false});
      v.srcObject=stream;
      await v.play().catch(()=>{});
      msgBox.style.display='none';
      statusEl.textContent=overlayUrl?'Ghost overlay ON':'Camera ready';
      return true;
    }catch(e){
      const err=e.name||'';
      let msg='Camera failed: '+(e.message||err);
      if(err==='NotAllowedError'||err==='PermissionDeniedError')msg='Camera permission denied. Grant access in browser/app settings, or use Gallery.';
      else if(err==='NotFoundError')msg='No camera found on this device.';
      else if(err==='NotReadableError')msg='Camera is in use by another app. Close it and try again.';
      msgText.textContent=msg;
      statusEl.textContent='Camera unavailable';
      return false;
    }
  };
  // Start camera immediately
  startCamera();
  // Fetch ghost photo in background
  hintEl.textContent='Looking for your last photo to overlay…';

      statusEl.textContent='Ghost overlay ON';
      let visible=true;
      toggleBtn.addEventListener('click',()=>{visible=!visible;overlay.style.opacity=visible?(opSlider.value/100):'0';toggleBtn.textContent=visible?'Hide':'Show';statusEl.textContent=visible?'Ghost overlay ON':'Ghost OFF'});
      opSlider.addEventListener('input',e=>{const v=parseInt(e.target.value,10);if(visible)overlay.style.opacity=String(v/100);opVal.textContent=v+'%'});
    }catch(e){hintEl.textContent='Could not load ghost photo: '+e.message}
  });
  modal.querySelector('#cam-x').addEventListener('click',()=>{cleanup();modal.remove()});
  modal.querySelector('#cam-flip').addEventListener('click',()=>{facing=facing==='user'?'environment':'user';startCamera()});
  // Gallery fallback uses file input
  modal.querySelector('#cam-fallback').addEventListener('click',()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{const u=await compressImage(f);cleanup();modal.remove();onCapture(u)}catch(err){toast('Photo error: '+err.message,'error')}});
    inp.click();
  });
  modal.querySelector('#cam-shoot').addEventListener('click',()=>{
    if(!stream){toast('Camera not ready','error');return}
    const c=document.createElement('canvas');
    c.width=v.videoWidth||1080;c.height=v.videoHeight||1920;
    const ctx=c.getContext('2d');
    if(facing==='user'){ctx.translate(c.width,0);ctx.scale(-1,1)}
    ctx.drawImage(v,0,0,c.width,c.height);
    const maxDim=1080;
    let w=c.width,hgt=c.height;
    if(w>hgt&&w>maxDim){hgt=Math.round(hgt*maxDim/w);w=maxDim}
    else if(hgt>maxDim){w=Math.round(w*maxDim/hgt);hgt=maxDim}
    const c2=document.createElement('canvas');c2.width=w;c2.height=hgt;
    c2.getContext('2d').drawImage(c,0,0,w,hgt);
    const dataUrl=c2.toDataURL('image/jpeg',0.85);
    cleanup();modal.remove();
    onCapture(dataUrl);
  });
}

// =================== HEALTH CONNECT — COMPREHENSIVE SYNC ===================
let healthConnectReady=false;
const HC_PERMS=['READ_STEPS','READ_HEART_RATE','READ_RESTING_HEART_RATE','READ_ACTIVE_CALORIES','READ_TOTAL_CALORIES','READ_DISTANCE','READ_EXERCISE','READ_WEIGHT','READ_BODY_FAT','READ_HEIGHT','READ_FLOORS_CLIMBED','READ_VO2_MAX','READ_SLEEP','WRITE_WEIGHT','WRITE_EXERCISE'];
const HC_DATA_TYPES=['steps','distance','active-calories','total-calories','floors-climbed','water','heart-rate','resting-heart-rate','oxygen-saturation','respiratory-rate','heart-rate-variability','vo2-max','weight','body-fat','height','blood-pressure-systolic','blood-pressure-diastolic','blood-glucose','body-temperature'];

function hcPlugin(){return window.Capacitor?.Plugins?.HealthPlugin||window.Capacitor?.Plugins?.CapacitorHealth||window.Capacitor?.Plugins?.Health||window.Capacitor?.Plugins?.HealthConnect}

// Write-back helpers. Plugin's exact write API varies across versions; we try multiple shapes.
async function writeWeightToHC(kg,dateIso){
  if(!IS_NATIVE)return false;
  if(!healthConnectReady){const ok=await setupHealthConnect();if(!ok)return false}
  const HC=hcPlugin();if(!HC||!kg)return false;
  // Feature-detect — capacitor-health@8.1.2 is read-only. Bail quietly if no write method exists.
  if(!HC.write&&!HC.writeData&&!HC.writeWeight&&!HC.insertWeight){console.info('HC: weight write not supported in this plugin version');return false}
  const ts=new Date(dateIso+'T12:00:00').toISOString();
  // Try the documented patterns in capacitor-health@8.x and fall through.
  const attempts=[
    ()=>HC.write?.({dataType:'weight',value:kg,startDate:ts,endDate:ts}),
    ()=>HC.writeData?.({dataType:'weight',value:kg,startDate:ts,endDate:ts}),
    ()=>HC.writeWeight?.({value:kg,date:ts}),
    ()=>HC.insertWeight?.({weight:kg,timestamp:ts}),
  ];
  for(const fn of attempts){
    try{const r=await fn();if(r!==undefined)return true}catch(e){/* try next */}
  }
  return false;
}
async function writeHydrationToHC(ml,dateIso){
  if(!IS_NATIVE||!ml)return false;
  if(!healthConnectReady){const ok=await setupHealthConnect();if(!ok)return false}
  const HC=hcPlugin();if(!HC)return false;
  if(!HC.write&&!HC.writeData&&!HC.writeHydration){console.info('HC: hydration write not supported');return false}
  const ts=new Date().toISOString();
  const attempts=[
    ()=>HC.write?.({dataType:'water',value:ml,startDate:ts,endDate:ts}),
    ()=>HC.writeData?.({dataType:'water',value:ml,startDate:ts,endDate:ts}),
    ()=>HC.writeHydration?.({volume:ml,date:ts}),
  ];
  for(const fn of attempts){try{const r=await fn();if(r!==undefined)return true}catch(e){}}
  return false;
}
async function setupHealthConnect(){
  if(!IS_NATIVE)return false;
  const HC=hcPlugin();
  if(!HC){console.warn('HC plugin missing');return false}
  try{
    const avail=await(HC.isHealthAvailable?.());
    if(avail&&avail.available===false){console.warn('HC unavailable');return false}
    await(HC.requestHealthPermissions?.({permissions:HC_PERMS}));
    healthConnectReady=true;
    return true;
  }catch(e){console.warn('HC setup',e);return false}
}

async function _hcAgg(HC,startIso,endIso,type){
  try{
    const r=await HC.queryAggregated?.({startDate:startIso,endDate:endIso,dataType:type,bucket:'day'});
    const arr=r?.aggregatedData||[];
    if(arr.length===0)return null;
    // sum across buckets or pick latest if non-summable
    if(['steps','distance','active-calories','total-calories','floors-climbed','water'].includes(type)){
      return arr.reduce((s,x)=>s+(x.value||0),0);
    }
    return arr[arr.length-1]?.value??null;
  }catch(e){return null}
}

async function syncHealthConnect(dateIso){
  if(!IS_NATIVE)return null;
  if(!healthConnectReady){const ok=await setupHealthConnect();if(!ok)return null}
  const HC=hcPlugin();if(!HC)return null;
  const date=dateIso||today();
  const start=new Date(date+'T00:00:00');
  const end=new Date(date+'T23:59:59');
  const startIso=start.toISOString(),endIso=end.toISOString();
  const hc={syncedAt:nowIso(),available:{}};

  // Pull every aggregatable data type
  for(const type of HC_DATA_TYPES){
    const v=await _hcAgg(HC,startIso,endIso,type);
    if(v!=null){hc[type.replace(/-/g,'_')]=v;hc.available[type]=true}
  }
  // Convert distance from meters to km if present
  if(hc.distance!=null)hc.distance_km=Math.round(hc.distance/10)/100;

  // Workouts/exercise sessions
  try{
    const r=await HC.queryWorkouts?.({startDate:startIso,endDate:endIso,includeHeartRate:true,includeRoute:false});
    hc.workouts=(r?.workouts||r?.sessions||[]).map(w=>({
      type:w.workoutType||w.type||w.exerciseType,
      sourceApp:w.sourceAppId||w.sourceName||w.source,
      start:w.startDate||w.startTime,
      end:w.endDate||w.endTime,
      durationSec:w.duration||w.durationSeconds,
      calories:w.calories||w.activeCalories,
      distance_m:w.distance,
      hrAvg:w.heartRateAvg||w.avgHeartRate,
      hrMax:w.heartRateMax||w.maxHeartRate,
      title:w.title||w.name,
    }));
    if(hc.workouts.length)hc.available.workouts=true;
  }catch(e){console.warn('HC workouts',e)}

  // Sleep — feature-detect; capacitor-health@8.1.2 doesn't expose querySleep, so we
  // pull it via aggregated 'sleep' bucket when available, otherwise gracefully skip.
  try{
    if(typeof HC.querySleep==='function'){
      const sleepStart=new Date(start.getTime()-30*3600*1000);
      const r=await HC.querySleep({startDate:sleepStart.toISOString(),endDate:endIso});
      const sessions=r?.sleepData||r?.sleepSessions||r?.sessions||[];
      if(sessions.length>0){
        const last=sessions[sessions.length-1];
        const s=new Date(last.startDate||last.startTime),e=new Date(last.endDate||last.endTime);
        hc.sleep={start:s.toISOString(),end:e.toISOString(),hours:Math.round((e-s)/360000)/10,stages:last.stages||last.sleepStages||null};
        hc.available.sleep=true;
      }
    }else{
      // Fallback: queryAggregated with 'sleep' or 'sleep-duration' if the plugin supports it
      const r=await HC.queryAggregated?.({startDate:startIso,endDate:endIso,dataType:'sleep',bucket:'day'}).catch(()=>null);
      const v=r?.aggregatedData?.[0]?.value;
      if(v){hc.sleep={hours:Math.round((v/3600)*10)/10};hc.available.sleep=true}
    }
  }catch(e){console.warn('HC sleep',e)}

  // HR streams — capacitor-health@8.1.2 doesn't expose a top-level HR query.
  // Heart-rate data comes through queryWorkouts with includeHeartRate:true (above).
  // Aggregate min/avg/max from any workout HR samples we collected.
  try{
    const hrVals=[];
    for(const w of hc.workouts||[]){
      if(w.hrAvg)hrVals.push(w.hrAvg);
      if(w.hrMax)hrVals.push(w.hrMax);
      if(Array.isArray(w.heartRate))for(const sample of w.heartRate){const b=sample.bpm||sample.value;if(b>0)hrVals.push(b)}
    }
    if(hrVals.length){
      hc.hr_min=Math.min(...hrVals);
      hc.hr_max=Math.max(...hrVals);
      hc.hr_avg=Math.round(hrVals.reduce((a,b)=>a+b,0)/hrVals.length);
      hc.hr_samples=hrVals.length;
    }
  }catch(e){}

  // Store in entry + push
  const e=state.data.entries[date]||{};
  e.hc=hc;
  e.hcSyncedAt=nowIso();
  // Note: we intentionally do NOT auto-populate entry.weight from HC.
  // Weight is manual-only — the app remains the source of truth and writes
  // back to HC via writeWeightToHC on save. HC weight is still recorded
  // under entry.hc.weight for reference / future trend cross-checks.
  state.data.entries[date]=e;
  saveLocalData();
  state.lastHcSyncAt=nowIso();
  if(isConfigured()){pushData().catch(err=>console.warn('hc push failed',err))}
  return hc;
}

// Multi-day backfill — useful on first run or after a gap. Syncs N days ending today.
async function syncHealthConnectRange(days=7){
  if(!IS_NATIVE)return {synced:0,failed:0};
  if(!healthConnectReady){const ok=await setupHealthConnect();if(!ok)return {synced:0,failed:0}}
  let synced=0,failed=0;
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    try{const r=await syncHealthConnect(iso);if(r)synced++;else failed++}catch(e){failed++}
  }
  return {synced,failed};
}

// Quick reads (kept for UI convenience — pull from cached HC sync)
function getHCToday(){return state.data.entries[today()]?.hc||null}
function hcWaterToday(){const hc=getHCToday()||{};return hc.water||0}  // ml from HC if logged elsewhere
function hcAvg(field,days=7){
  const ents=Object.entries(state.data.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,days);
  const vals=ents.map(([d,e])=>e.hc?.[field]).filter(v=>v!=null&&!isNaN(v));
  if(vals.length===0)return null;
  return vals.reduce((s,v)=>s+v,0)/vals.length;
}
function hcSleepAvg(days=7){
  const ents=Object.entries(state.data.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,days);
  const vals=ents.map(([d,e])=>e.hc?.sleep?.hours).filter(v=>v!=null);
  if(vals.length===0)return null;
  return vals.reduce((s,v)=>s+v,0)/vals.length;
}
function hcWeekTotal(field){
  const ents=Object.entries(state.data.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
  return ents.reduce((s,[d,e])=>s+(e.hc?.[field]||0),0);
}

async function readTodayHR(){
  if(!IS_NATIVE||!healthConnectReady)return null;
  const HC=window.Capacitor?.Plugins?.CapacitorHealth||window.Capacitor?.Plugins?.Health;
  if(!HC)return null;
  const start=new Date();start.setHours(0,0,0,0);
  const end=new Date();
  try{
    const r=await HC.queryAggregated?.({startDate:start.toISOString(),endDate:end.toISOString(),dataType:'heart-rate',bucket:'day'});
    return r?.aggregatedData?.[0]?.value||null;
  }catch(e){return null}
}
async function readLastSleep(){
  if(!IS_NATIVE||!healthConnectReady)return null;
  const HC=window.Capacitor?.Plugins?.CapacitorHealth||window.Capacitor?.Plugins?.Health;
  if(!HC)return null;
  const end=new Date(),start=new Date(end.getTime()-36*3600*1000);
  try{
    const r=await HC.querySleep?.({startDate:start.toISOString(),endDate:end.toISOString()});
    const sessions=r?.sleepData||[];
    if(sessions.length===0)return null;
    const last=sessions[sessions.length-1];
    const hrs=(new Date(last.endDate)-new Date(last.startDate))/3600000;
    return Math.round(hrs*10)/10;
  }catch(e){return null}
}


loadLocal();
if(isConfigured())state.screen='today';else state.screen='welcome';
setStatusTime();setInterval(setStatusTime,30000);
render();
loadAllDB().then(()=>{state.todayRec=null;render()});
if(IS_NATIVE){
  setupHealthConnect().then(ok=>{
    if(!ok)return;
    // Decide between single-day and multi-day backfill.
    // If we haven't synced HC in the last 12 hours, backfill last 7 days. Otherwise just today.
    const last=state.data.entries[today()]?.hcSyncedAt;
    const stale=!last||((Date.now()-new Date(last).getTime())>12*3600*1000);
    const job=stale?syncHealthConnectRange(7):syncHealthConnect();
    Promise.resolve(job).then(r=>{render()});
  });
}
if(isConfigured())pullData().then(()=>render()).catch(e=>console.warn('boot sync failed',e));
