<style>
:root{--surface-outer:#E6EFF6;--surface-cream:#FAF6EE;--surface-white:#FFFFFF;--surface-sky:#E0EBF4;--ink:#1A1F2E;--muted:#7C8497;--faint:#B7BCC9;--coral:#ED7A4D;--coral-s:#F8D9C9;--sky:#6DA9D6;--sky-s:#D2E2EF;--sun:#F2C84B;--sun-s:#FBEBB6;--mint:#8CCB9C;--mint-s:#D5EBDA;--cta:#0F0F12;--border:#D9DFE6;--border-l:#E8EBF0;--success:#4DA869;--success-s:#E8F3EC;--strava:#FC5200;--danger:#E26060;--r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;--sh-card:0 2px 12px rgba(26,31,46,0.04);--sh-elev:0 8px 24px rgba(26,31,46,0.08);--sh-up:0 -4px 16px rgba(26,31,46,0.05)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior-y:contain}
body{font-family:'Sora',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--surface-outer);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}
input,textarea,button,select{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--ink);text-decoration:none}
#root{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--surface-cream)}
.status-bar{height:50px;padding:max(16px,env(safe-area-inset-top)) 24px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.status-bar .time{font-size:15px;font-weight:600}

.top-bar{display:flex;align-items:center;gap:14px;padding:14px 20px 8px;flex-shrink:0}

main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 24px;-webkit-overflow-scrolling:touch}

<script>
'use strict';
const STORAGE_KEY='living-life-config-v2',DATA_KEY='living-life-data-v2',APP_VERSION='4.1.0';
const ACTIVITIES=['Walk','Strength workout','Run','Yoga / stretch','Amazon shift','Rest day'];
const SUPPLEMENTS=[
  {id:'creatine',name:'Creatine monohydrate',dose:'5 g',timing:'anytime',color:'coral',ini:'C'},
  {id:'whey',name:'Whey protein',dose:'25-50 g',timing:'post-workout / breakfast',color:'sun',ini:'W'},
  {id:'d3',name:'Vitamin D3',dose:'2000 IU',timing:'with breakfast (fat)',color:'sky',ini:'D'},
  {id:'b12',name:'Methylcobalamin B12',dose:'500 µg',timing:'sublingual, anytime',color:'mint',ini:'B'},
  {id:'omega3',name:'Algal omega-3',dose:'500 mg EPA+DHA',timing:'with breakfast',color:'sky',ini:'O'},
];

// =================== DATABASE LOADERS ===================
const DB_BASE='https://raw.githubusercontent.com/vedantpatel699/living-life-app/main/data/';
const DB={foods:null,supplements:null,foodsBySlug:{},_loading:{},_err:{}};
function loadDB(name){
  if(DB[name])return Promise.resolve(DB[name]);
  if(DB._loading[name])return DB._loading[name];
  DB._loading[name]=(async()=>{
    try{
      const r=await fetch(DB_BASE+name+'.json',{cache:'no-cache'});
      if(!r.ok)throw new Error('HTTP '+r.status);
      DB[name]=await r.json();
      DB._err[name]=null;
      if(name==='foods'){DB.foodsBySlug={};for(const f of DB.foods.foods){DB.foodsBySlug[f.id]=f}}
      return DB[name];
    }catch(e){console.warn('DB load',name,e);DB._err[name]=e.message||String(e);return null}
    finally{delete DB._loading[name]}
  })();
  return DB._loading[name];
}
async function loadAllDB(){await Promise.all(['foods','supplements'].map(loadDB))}

// Today's supplement schedule — picks shift schedule on shift days, daily schedule otherwise.
// A "training day" = a shift day OR a day where Health Connect logged a workout.
function todaySuppSchedule(){
  if(!DB.supplements)return null;
  const shift=isShiftDay();
  const hc=getHCToday()||{};
  const hcWorkouts=(hc.workouts||[]);
  const isTrainingDay=shift||hcWorkouts.length>0;
  const isRunDay=hcWorkouts.some(w=>{const t=(w.type||w.title||'').toLowerCase();return t.includes('run')||t.includes('jog')||t.includes('c25k')});
  // On shift days, prefer shiftSchedule if defined
  const source=(shift&&DB.supplements.shiftSchedule)?DB.supplements.shiftSchedule:DB.supplements.dailySchedule;
  const slots=source.map(slot=>{
    const items=slot.include.map(id=>{
      const s=DB.supplements.supplements.find(x=>x.id===id);
      if(!s)return null;
      // Electrolytes only on actual workout/run days
      if(s.id==='electrolytes'&&!isTrainingDay)return null;
      if(s.frequency==='training-days-only'&&!isTrainingDay)return null;
      if(s.frequency==='run-days-only'&&!isRunDay)return null;
      return s;
    }).filter(Boolean);
    if(slot.conditional==='training-day'&&!isTrainingDay)return null;
    if(slot.conditional==='workout-day'&&!isTrainingDay)return null;
    if(items.length===0)return null;
    return{...slot,items};
  }).filter(Boolean);
  return slots;
}

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowIso(){return new Date().toISOString()}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function fmtDateLong(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}
function fmtDateTime(iso){if(!iso)return'';return new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function daysAgo(iso){const a=new Date(iso+'T00:00:00'),b=new Date(today()+'T00:00:00');return Math.round((b-a)/86400000)}

function gfRing({value=0,goal=10000,label='',sub='',size=200,color='var(--coral)',track='var(--surface-cream)',thick=14,centerLabel=''}){
  const r=(size-thick)/2,c=size/2;
  const circ=2*Math.PI*r;
  const pct=Math.min(1,goal>0?value/goal:0);
  const dash=circ*pct;
  const num=value>=10000?(value/1000).toFixed(1)+'k':Math.round(value).toLocaleString();
  return `<div class="gf-ring-wrap" style="width:${size}px;height:${size}px">
<svg viewBox="0 0 ${size} ${size}" style="position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)">
<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${track}" stroke-width="${thick}"/>
<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${thick}" stroke-linecap="round" stroke-dasharray="${dash} ${circ}" style="transition:stroke-dasharray 0.6s ease-out"/>
</svg>
<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 16px">
<div class="gf-ring-num">${num}</div>
${centerLabel?`<div class="gf-ring-label">${centerLabel}</div>`:''}
${label?`<div class="gf-ring-sub">${label}</div>`:''}
${sub?`<div class="gf-ring-sub" style="margin-top:2px">${sub}</div>`:''}
</div>
</div>`;
}
// v4.0 — DUAL RING: outer single-color arc + inner stacked-segment arc (passive + active kcal in
// two hues of the same color). Compositionally cleaner than two separate single-value rings.
function gfDualRing({outerValue=0,outerGoal=10000,outerLabel='STEPS',outerColor='var(--ink)',
  innerSegments=[],innerGoal=2000,innerLabel='',size=220,thickOuter=10,thickInner=14}){
  // outerSegments: simple progress vs goal
  // innerSegments: array of { value, color } stacked toward innerGoal
  const cx=size/2,cy=size/2;
  const rOuter=(size-thickOuter)/2;
  const rInner=rOuter-thickOuter/2-thickInner/2-4;
  const circOuter=2*Math.PI*rOuter;
  const circInner=2*Math.PI*rInner;
  const pctOuter=Math.min(1,outerGoal>0?outerValue/outerGoal:0);
  // Inner: compute cumulative dashOffsets so each segment starts where the previous ended
  const innerTotal=innerSegments.reduce((s,seg)=>s+(seg.value||0),0);
  let cumStart=0;
  const innerArcs=innerSegments.map(seg=>{
    const len=Math.min(seg.value/innerGoal,1-cumStart);
    const start=cumStart;
    cumStart+=len;
    return {dasharray:`${len*circInner} ${circInner}`,dashoffset:-start*circInner,color:seg.color};
  });
  const outerNum=outerValue>=10000?(outerValue/1000).toFixed(1)+'k':Math.round(outerValue).toLocaleString();
  return `<div style="width:${size}px;height:${size}px;position:relative;margin:0 auto">
<svg viewBox="0 0 ${size} ${size}" style="position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)">
<circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="none" stroke="var(--surface-cream)" stroke-width="${thickOuter}"/>
<circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="none" stroke="${outerColor}" stroke-width="${thickOuter}" stroke-linecap="round" stroke-dasharray="${pctOuter*circOuter} ${circOuter}" style="transition:stroke-dasharray 0.6s ease-out"/>
<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="none" stroke="var(--surface-cream)" stroke-width="${thickInner}"/>
${innerArcs.map(a=>`<circle cx="${cx}" cy="${cy}" r="${rInner}" fill="none" stroke="${a.color}" stroke-width="${thickInner}" stroke-linecap="round" stroke-dasharray="${a.dasharray}" stroke-dashoffset="${a.dashoffset}" style="transition:stroke-dasharray 0.6s ease-out"/>`).join('')}
</svg>
<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 16px">
<div style="font-size:44px;font-weight:700;letter-spacing:-0.02em;line-height:1;color:${outerColor}">${outerNum}</div>
<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px">${outerLabel}</div>
${innerLabel?`<div class="tiny faint" style="margin-top:4px">${innerLabel}</div>`:''}
</div>
</div>`;
}

function isShiftDay(d){
  const dt=d||new Date();
  const iso=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  // Per-day shift tracker (state.data.shiftDates) — primary source
  if((state.data.shiftDates||[]).includes(iso))return true;

function currentWeight(){const ents=Object.entries(state.data.entries||{}).filter(([d,e])=>typeof e.weight==='number').sort((a,b)=>b[0].localeCompare(a[0]));return ents[0]?ents[0][1].weight:state.profile.startWeight}
// BMR via Mifflin-St Jeor (validated gold-standard against indirect calorimetry — Frankenfield 2005).
// kcal/day = 10×kg + 6.25×cm − 5×age + (5 male / −161 female). Uses CURRENT weight so passive-calorie
// estimate stays accurate as the user loses weight.
function bmrPerMin(){const p=state.profile;const wt=currentWeight();const bmr=10*wt+6.25*p.heightCm-5*p.age+(p.sex==='female'?-161:5);return bmr/1440}
function bmrSoFarToday(){const now=new Date();const minsSinceMidnight=now.getHours()*60+now.getMinutes();return Math.round(bmrPerMin()*minsSinceMidnight)}
function fullBmr(){return Math.round(bmrPerMin()*1440)}

// Ensure all v3 fields exist on a loaded state.data (idempotent — safe to run any number of times)
function migrateData(){
  const d=state.data;
  d.version=3;
  if(!d.entries)d.entries={};
  if(!d.supplements)d.supplements={};
  if(!d.coachConversation)d.coachConversation=[];
  if(!d.customFoods)d.customFoods=[];
  if(!d.mealTemplates)d.mealTemplates=[];    // Saved post-shift meal etc.
  if(!d.frequencyPattern)d.frequencyPattern={}; // Food picker personalization
  if(!d.shiftDates)d.shiftDates=[];          // Per-day shift markers (replaces profile.shiftDays)
  // v3.15 migration — old single entry.photo becomes entry.photoFront (preserves all existing photos)
  for(const date in (d.entries||{})){
    const e=d.entries[date];
    if(e&&e.photo&&!e.photoFront){e.photoFront=e.photo}
  }
}

async function ghRequest(method,path,body){
  const url=`https://api.github.com/repos/${state.config.githubOwner}/${state.config.githubRepo}/${path}`;
  const res=await fetch(url,{method,headers:{'Authorization':`Bearer ${state.config.githubToken}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(body?{'Content-Type':'application/json'}:{})},body:body?JSON.stringify(body):undefined});
  if(res.status===404)return{notFound:true};
  if(!res.ok){const txt=await res.text();throw new Error(`GitHub ${res.status}: ${txt.slice(0,180)}`)}
  return res.json();
}
function b64enc(s){return btoa(unescape(encodeURIComponent(s)))}
function b64dec(s){try{return decodeURIComponent(escape(atob(s.replace(/\s/g,''))))}catch(e){return''}}
async function ghGetFile(path){const b=state.config.branch||'main';return ghRequest('GET',`contents/${encodeURIComponent(path).replace(/%2F/g,'/')}?ref=${b}`)}
async function ghPutFile(path,c,m,sha){const b=state.config.branch||'main';const body={message:m,content:c,branch:b};if(sha)body.sha=sha;return ghRequest('PUT',`contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`,body)}
async function pullData(){if(!isConfigured())throw new Error('Not configured');state.isSyncing=true;try{const r=await ghGetFile('data/log.json');if(r.notFound){state.dataSha=null}else{const parsed=JSON.parse(b64dec(r.content));state.data=Object.assign(state.data,parsed);state.dataSha=r.sha}migrateData();saveLocalData();state.lastSyncOk=nowIso()}finally{state.isSyncing=false}}
async function pushData(){if(!isConfigured())throw new Error('Not configured');state.isSyncing=true;try{const c=b64enc(JSON.stringify(state.data,null,2));const r=await ghPutFile('data/log.json',c,`update ${today()}`,state.dataSha);state.dataSha=r.content.sha;saveLocalData();state.lastSyncOk=nowIso()}finally{state.isSyncing=false}}
async function uploadPhoto(d,du,side='front'){const b64=du.split(',')[1];const suffix=side==='side'?'_s':'_f';const path=`data/photos/${d}${suffix}.jpg`;let sha=null;try{const e=await ghGetFile(path);if(e&&!e.notFound)sha=e.sha}catch(e){}await ghPutFile(path,b64,`photo ${d} ${side}`,sha);return path}

function compressImage(file,maxDim=1080,q=0.82){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim}else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim}const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.onerror=rej;img.src=e.target.result};r.onerror=rej;r.readAsDataURL(file)})}

function beep(freq=800,dur=120){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.2,audioCtx.currentTime+0.01);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur/1000);o.start();o.stop(audioCtx.currentTime+dur/1000)}catch(e){}}

function weightStats(){
  const ents=Object.entries(state.data.entries).filter(([d,e])=>typeof e.weight==='number').sort((a,b)=>a[0].localeCompare(b[0]));
  if(ents.length===0)return null;
  const avg=a=>a.reduce((s,x)=>s+x,0)/a.length;
  const l7=ents.slice(-7).map(e=>e[1].weight),p7=ents.slice(-14,-7).map(e=>e[1].weight);
  const avgNow=l7.length?avg(l7):null,avgPrev=p7.length?avg(p7):null;
  const latest=ents[ents.length-1],first=ents[0];
  return{latest:latest[1].weight,latestDate:latest[0],first:first[1].weight,firstDate:first[0],totalChange:latest[1].weight-first[1].weight,avgNow,avgPrev,weekChange:(avgNow!==null&&avgPrev!==null)?avgNow-avgPrev:null,points:ents.map(([d,e])=>({x:d,y:e.weight}))};
}
function calcStreak(){let s=0,d=new Date(today()+'T00:00:00'),first=true;while(true){const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(state.data.entries[iso]){s++;d.setDate(d.getDate()-1)}else{if(first&&iso===today()){d.setDate(d.getDate()-1);first=false;continue}break}first=false}return s}
// v3.18 — nutrition totals (leucine / selenium / glycemic load) for a given ISO date.
// GI is intensive (not portion-scaled) — look it up from DB.foodsBySlug when computing GL.
// Returns null fields when no data available (avoids "0" when nothing was logged).
function nutritionTotalsForDay(iso){
  const e=state.data.entries[iso];
  if(!e||!e.foods||e.foods.length===0)return {leucine:null,selenium:null,glycemicLoad:null};
  let leu=0,sel=0,gl=0,hasLeu=false,hasSel=false,hasGl=false;
  for(const food of e.foods){
    if(typeof food.leucine_g==='number'){leu+=food.leucine_g;hasLeu=true}
    if(typeof food.selenium_ug==='number'){sel+=food.selenium_ug;hasSel=true}
    // GL contribution = GI × food.carbs(g) / 100  — entry.carbs already has portion-adjusted carbs
    const dbFood=DB.foodsBySlug?.[food.foodId];
    const gi=dbFood?.glycemic_index;
    if(gi!=null && typeof food.carbs==='number'){gl+=gi*food.carbs/100;hasGl=true}
  }
  return {leucine:hasLeu?leu:null,selenium:hasSel?sel:null,glycemicLoad:hasGl?gl:null};
}
// Color band per RESEARCH_FOUNDATION §nutrition + spec doc.
// leucine: red<8, amber 8-10, green>=10  (Witard 2014 MPS-min 2.5g/meal × 4 meals = 10g/day)
// selenium: amber<55, green 55-400, red>400 (toxicity ceiling)
// gl: green<100, amber 100-120, red>120
function nutritionBand(metric,v){
  if(v==null)return 'gray';
  if(metric==='leucine')return v<8?'red':v<10?'amber':'green';
  if(metric==='selenium')return v<55?'amber':v<=400?'green':'red';
  if(metric==='glycemicLoad'||metric==='gl')return v<100?'green':v<=120?'amber':'red';
  return 'gray';
}
function nutritionBandColor(band){
  if(band==='red')return '#E63946';
  if(band==='amber')return '#F2A65A';
  if(band==='green')return '#4CAF6E';
  return '#B7BCC9';
}
// v3.20 — confidence for a food entry. Prefers snapshot on the entry, falls back to live DB lookup.
function foodConfidence(entry){
  if(entry && entry.confidence)return entry.confidence;
  const db=DB.foodsBySlug?.[entry?.foodId];
  return db?.source?.confidence||null;
}

function bindOnboarding(){
  const step=state.draft.onbStep||1;

  document.getElementById('onb-next')?.addEventListener('click',()=>{
    const p=state.draft.profile||{...state.profile};
    if(step===1)p.name=document.getElementById('onb-name').value.trim();
    if(step===2){p.age=parseInt(document.getElementById('onb-age').value,10)||p.age;p.heightCm=parseInt(document.getElementById('onb-height').value,10)||p.heightCm;p.startWeight=parseFloat(document.getElementById('onb-weight').value)||p.startWeight}
    if(step===3){p.goalWeight=parseFloat(document.getElementById('onb-gw').value)||p.goalWeight;p.goalDate=document.getElementById('onb-gd').value}
    state.draft.profile=p;set(step+1);
  });
  document.getElementById('onb-finish')?.addEventListener('click',async()=>{
    state.config.githubOwner=document.getElementById('onb-u').value.trim();
    state.config.githubRepo=document.getElementById('onb-r').value.trim();

  });
}

// Increment usage count + record time-of-day on every food log. Used to sort food picker so
// most-used foods bubble up. Per-meal leucine surfaces in the picker as a small chip.
function recordFoodUsage(foodId){
  if(!foodId)return;
  state.data.frequencyPattern=state.data.frequencyPattern||{};
  const fp=state.data.frequencyPattern;
  const e=fp[foodId]||{count:0,byHour:{}};
  e.count=(e.count||0)+1;
  e.lastLogged=nowIso();
  const hr=new Date().getHours();
  e.byHour[hr]=(e.byHour[hr]||0)+1;
  fp[foodId]=e;
  saveLocalData();
}
function foodFreq(foodId){return state.data.frequencyPattern?.[foodId]?.count||0}

function addWaterEntry(ml){
  if(!ml||ml<=0)return;
  const t=today();
  const e=state.data.entries[t]||{};
  e.foods=e.foods||[];
  // Calgary Tap Water nutrient profile per 100g (= 100ml)
  const W={kcal:0,protein:0,carbs:0,fat:0,sodium_mg:2,potassium_mg:1,calcium_mg:56,magnesium_mg:16};
  const f=ml/100;
  const portionName=ml===250?'1 glass (250ml)':ml===500?'1 bottle (500ml)':ml===240?'1 cup (240ml)':ml===1000?'1 liter (1000ml)':ml+'ml (custom)';
  e.foods.push({foodId:'calgary-tap-water',name:'Calgary Tap Water',portionName,grams:ml,kcal:0,protein:0,carbs:0,fat:0,sodium_mg:+(W.sodium_mg*f).toFixed(2),potassium_mg:+(W.potassium_mg*f).toFixed(2),calcium_mg:+(W.calcium_mg*f).toFixed(1),magnesium_mg:+(W.magnesium_mg*f).toFixed(1)});
  e.updatedAt=nowIso();
  state.data.entries[t]=e;
  saveLocalData();
  nativeHaptic('light');
  render();
  // Best-effort background syncs (don't block UI)
  pushData().catch(err=>console.warn('water sync',err));
  writeHydrationToHC(ml,t).catch(()=>{});
}

// v3.18 — drill-down for the Nutrition Today rows. Shows per-food contribution + 7-day trend bar chart.
function openNutritionBreakdown(metric){
  const cfg={
    leucine:{label:'Leucine',unit:'g',target:10,fmt:v=>v.toFixed(2),blurb:'Witard 2014: 2.5g leucine per meal is the MPS-stimulation minimum. ~10g/day total spread over 4 meals is the practical aim.'},
    selenium:{label:'Selenium',unit:'µg',target:55,fmt:v=>v.toFixed(1),blurb:'55µg/day RDA. SSRI users: keep dietary intake adequate but avoid high-dose supplements (interaction risk).'},
    glycemicLoad:{label:'Glycemic Load',unit:'GL',target:100,fmt:v=>v.toFixed(0),blurb:'Daily GL <100 = low-impact pattern. 100-120 borderline. >120 elevates metabolic risk, esp. on shift work.'}
  }[metric]||{label:metric,unit:'',target:0,fmt:v=>String(v),blurb:''};
  const todayIso=today();
  const nut=nutritionTotalsForDay(todayIso);
  const todayVal=metric==='glycemicLoad'?nut.glycemicLoad:nut[metric];
  // Per-food contribution today
  const entry=state.data.entries[todayIso];
  const foods=(entry?.foods||[]).map(f=>{
    let v=null;
    if(metric==='leucine')v=f.leucine_g;
    else if(metric==='selenium')v=f.selenium_ug;
    else if(metric==='glycemicLoad'){
      const db=DB.foodsBySlug?.[f.foodId];
      if(db?.glycemic_index!=null && typeof f.carbs==='number')v=db.glycemic_index*f.carbs/100;
    }
    return {name:f.name,portion:f.portionName,value:v||0};
  }).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  // 7-day history
  const hist=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const t=nutritionTotalsForDay(iso);
    const v=metric==='glycemicLoad'?t.glycemicLoad:t[metric];
    hist.push({iso,date:d,value:v});
  }
  const maxHist=Math.max(cfg.target,...hist.map(h=>h.value||0))||cfg.target;
  const band=nutritionBand(metric,todayVal);
  const color=nutritionBandColor(band);
  const m=document.createElement('div');m.className='modal-bg';
  m.innerHTML=`<div class="modal"><div class="modal-handle"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
    <h2 style="font-size:20px;font-weight:700">${cfg.label}</h2>
    <button id="nb-x" class="back-btn" style="width:36px;height:36px;font-size:16px">×</button>
  </div>
  <div style="font-size:32px;font-weight:700;color:${color};letter-spacing:-0.02em">${todayVal!=null?cfg.fmt(todayVal):'—'} <span class="tiny faint" style="font-weight:500">/ ${cfg.target} ${cfg.unit}</span></div>
  <p class="tiny muted" style="margin-top:4px">today · ${band==='red'?'below target':band==='amber'?'getting there':band==='green'?'on target':'no data'}</p>
  <h3 class="mt-4" style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)">Last 7 days</h3>
  <div style="display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:10px;padding:0 2px">
    ${hist.map(h=>{const v=h.value||0;const hp=Math.max(2,Math.round((v/maxHist)*72));const isToday=h.iso===todayIso;const b=nutritionBand(metric,v);const c=v?nutritionBandColor(b):'var(--border-l)';return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;height:${hp}px;background:${c};border-radius:3px;${isToday?'outline:2px solid var(--ink);outline-offset:1px':''}"></div><div class="tiny faint">${h.date.toLocaleDateString(undefined,{weekday:'narrow'})}</div></div>`}).join('')}
  </div>
  <h3 class="mt-4" style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)">Today's contributors</h3>
  ${foods.length===0?'<p class="tiny muted mt-2">No foods contributing yet.</p>':`<div style="margin-top:10px">
    ${foods.map(f=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-l)"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">${escapeHtml(f.name)}</div><div class="tiny faint">${escapeHtml(f.portion||'')}</div></div><div style="font-weight:700;font-size:13px;color:${color}">${cfg.fmt(f.value)} ${cfg.unit}</div></div>`).join('')}
  </div>`}
  <p class="tiny faint" style="margin-top:16px;line-height:1.5">${escapeHtml(cfg.blurb)}</p>
  </div>`;
  m.addEventListener('click',ev=>{if(ev.target===m)m.remove()});
  m.querySelector('#nb-x').addEventListener('click',()=>m.remove());
  document.body.appendChild(m);
}

<div class="grid-2 mt-4">

  document.getElementById('s-hcbackfill')?.addEventListener('click',async()=>{const btn=document.getElementById('s-hcbackfill');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Backfilling 7 days…';const r=await syncHealthConnectRange(7);btn.disabled=false;btn.textContent='↻↻ Backfill last 7 days';toast(`Backfilled ${r.synced}/7 days · ${r.failed} skipped`, r.synced>0?'success':'error');render()});

  document.getElementById('s-diag-test')?.addEventListener('click',async()=>{
    const lines=[];
    lines.push('Capacitor: '+(window.Capacitor?'present':'MISSING'));
    lines.push('IS_NATIVE: '+IS_NATIVE);
    lines.push('Platform: '+(window.Capacitor?.getPlatform?.()||'none'));
    lines.push('Plugins: '+Object.keys(window.Capacitor?.Plugins||{}).join(', '));

    lines.push('hcPlugin(): '+(HC?'found':'null'));
    if(HC){
      lines.push('HC methods: '+Object.keys(HC).filter(k=>typeof HC[k]==='function').slice(0,10).join(', '));
      try{const a=await(HC.isHealthAvailable?.());lines.push('isHealthAvailable: '+JSON.stringify(a))}catch(e){lines.push('isHealthAvailable err: '+e.message)}
    }

    lines.push('Sleep plugin: '+(SL?'found':'MISSING'));

      try{const r=await SL.queryBodyBattery();lines.push('Sleep.queryBodyBattery: '+JSON.stringify(r))}catch(e){lines.push('Sleep.queryBodyBattery err: '+e.message)}
    }
    const SR=window.Capacitor?.Plugins?.ShiftRescue;

    if(SR){
      try{const r=await SR.listScheduled();lines.push('ShiftRescue.listScheduled: '+JSON.stringify(r))}catch(e){lines.push('ShiftRescue.listScheduled err: '+e.message)}
    }
    alert(lines.join('\n\n'));
  });
  document.getElementById('s-refresh')?.addEventListener('click',async()=>{Object.assign(DB,{foods:null,supplements:null});await loadAllDB();const failed=Object.entries(DB._err||{}).filter(([k,v])=>v);if(failed.length===0)toast('Databases refreshed ✓','success');else toast('Some failed: '+failed.map(([k])=>k).join(', '),'error');render()});
  document.getElementById('s-diag-toggle')?.addEventListener('change',e=>{
    state.config.showDiagnostics=e.target.checked;
    saveLocalConfig();
    render();
  });
  document.getElementById('s-clear')?.addEventListener('click',()=>{if(confirm('Clear local cache?')){localStorage.removeItem(DATA_KEY);state.data={version:3,entries:{},supplements:{},coachConversation:[],customFoods:[],mealTemplates:[],frequencyPattern:{},shiftDates:[]};state.dataSha=null;toast('Cleared');render()}});
}

async function callClaude(messages,sys,maxTok=1500){
  if(!state.config.claudeApiKey)throw new Error('No Claude API key');

  if(!res.ok){const t=await res.text();throw new Error(`Claude ${res.status}: ${t.slice(0,200)}`)}
  const d=await res.json();return d.content?.[0]?.text||'';
}

const METRIC_DEFS = {
  weight: {label:'Weight',unit:'kg',color:'var(--ink)',source:'manual',blurb:'Body weight logged daily. Daily noise comes from water, food, glycogen. The 7-day moving average is the real signal.'},
  protein: {label:'Protein',unit:'g',color:'var(--coral)',source:'food log',blurb:'Daily protein intake from logged foods. Target 130-140g/day for muscle preservation in deficit (Witard 2014).'},
  active_kcal: {label:'Active calories',unit:'kcal',color:'var(--coral)',source:'Health Connect',blurb:'Active calories burned above your resting metabolism. Wearable estimates have 27-93% error (Stanford 2017) — trust the trend, not the daily number.'},
  rhr: {label:'Resting heart rate',unit:'bpm',color:'var(--coral)',source:'Health Connect',blurb:'Your morning resting heart rate. Trend up over weeks can mean illness, overtraining, or sleep debt.'},
  hrv: {label:'Heart rate variability',unit:'ms',color:'var(--sky)',source:'Health Connect',blurb:'RMSSD HRV from Garmin. Within-day variability is high — interpret only the 7-day average trend.'},
  steps: {label:'Steps',unit:'',color:'var(--ink)',source:'Health Connect',blurb:'Daily step count. Useful for spotting changes in your overall activity, not as a strict goal.'},
  vo2_max: {label:'VO₂max',unit:'',color:'var(--mint)',source:'Health Connect',blurb:'Cardiorespiratory fitness estimate from Garmin. Move 8-12 week direction only.'},
};

  const period=state.metricPeriod||'week';
  return `<div class="top-bar"><button class="back-btn" id="md-back">←</button><div class="title-block"><h1>${escapeHtml(def.label)}</h1></div><div style="width:44px"></div></div>
<div style="padding:0 4px 80px">
  <div style="display:flex;border-bottom:1px solid var(--border-l)">

  </div>

function metricRangeLabel(period){
  const d=new Date();
  if(period==='day')return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  if(period==='week')return 'Last 7 days';
  if(period==='month')return 'Last 30 days';
  if(period==='year')return 'Last 12 months';
  return '';
}

// Pull a value for a metric on a given ISO date from state.data.entries
function metricValueFor(metric,iso){
  const e=state.data.entries[iso];
  if(!e)return null;
  if(metric==='weight')return typeof e.weight==='number'?e.weight:null;
  if(metric==='protein'){const foods=e.foods||[];const v=foods.reduce((s,f)=>s+(f.protein||0),0);return foods.length>0?v:null}
  if(metric==='active_kcal')return e.hc?.active_calories??null;
  if(metric==='rhr')return e.hc?.resting_heart_rate??null;
  if(metric==='hrv')return e.hc?.hrv_rmssd_avg??null;
  if(metric==='steps')return e.hc?.steps??null;
  if(metric==='vo2_max')return e.hc?.vo2_max??null;
  return null;
}

function bindMetricDetail(){
  document.getElementById('md-back')?.addEventListener('click',()=>{state.metric=null;state.metricPeriod=null;setScreen('today')});
  document.querySelectorAll('.md-tab').forEach(b=>b.addEventListener('click',()=>{state.metricPeriod=b.dataset.period;render()}));
  // Draw the chart
  setTimeout(()=>drawMetricChart(),50);
}

function drawMetricChart(){
  const canvas=document.getElementById('md-chart');
  if(!canvas||!window.Chart)return;
  const metric=state.metric||'weight';
  const def=METRIC_DEFS[metric]||METRIC_DEFS.weight;
  const period=state.metricPeriod||'week';
  // Build labels + values based on period
  let labels=[],values=[];
  const today_=new Date();today_.setHours(0,0,0,0);
  let days;
  if(period==='day')days=1;
  else if(period==='week')days=7;
  else if(period==='month')days=30;
  else days=365;
  for(let i=days-1;i>=0;i--){
    const d=new Date(today_);d.setDate(d.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    labels.push(d);
    values.push(metricValueFor(metric,iso));
  }
  // Compute total/average for the period
  const valid=values.filter(v=>v!=null);
  let total=null,totalLabel=def.unit||'';
  if(valid.length>0){
    if(['weight','rhr','hrv','vo2_max'].includes(metric)){
      // Use average for these
      total=(valid.reduce((s,v)=>s+v,0)/valid.length);
      totalLabel='avg '+(def.unit||'');
    }else{
      total=valid.reduce((s,v)=>s+v,0);
      totalLabel='total '+(def.unit||'');
    }
  }
  // Render the total
  const totalEl=document.getElementById('md-total');
  const totalLabelEl=document.getElementById('md-total-label');
  if(totalEl){
    if(total==null){totalEl.textContent='—';if(totalLabelEl)totalLabelEl.textContent='no data'}
    else{
      const formatted=metric==='weight'||metric==='hrv'||metric==='vo2_max'?total.toFixed(1):Math.round(total).toLocaleString();
      totalEl.textContent=formatted;
      if(totalLabelEl)totalLabelEl.textContent=totalLabel;
    }
  }
  // Render chart — bar for totals, line for averages
  const useBar=['protein','active_kcal','steps'].includes(metric);
  const ctx=canvas.getContext('2d');
  // Color helpers
  const c=def.color||'var(--ink)';
  // Build labels for axis (short)
  let axisLabels;
  if(period==='day'){
    // No data per-hour stored yet — fall back to a single bar
    axisLabels=[labels[0].toLocaleDateString(undefined,{weekday:'short'})];
    values=[values[0]];
  }else if(period==='week'){
    axisLabels=labels.map(d=>d.toLocaleDateString(undefined,{weekday:'short'})[0]);
  }else if(period==='month'){
    axisLabels=labels.map((d,i)=>i%7===0||i===labels.length-1?d.getDate()+'':'');
  }else{
    // year: pick monthly
    const monthly=[],monthLabels=[];
    let cur=new Date(today_);cur.setDate(1);
    for(let i=11;i>=0;i--){
      const d=new Date(today_);d.setMonth(d.getMonth()-i);d.setDate(1);
      monthly.push(values.filter((v,idx)=>v!=null && labels[idx].getMonth()===d.getMonth() && labels[idx].getFullYear()===d.getFullYear()));
      monthLabels.push(d.toLocaleDateString(undefined,{month:'short'}));
    }
    values=monthly.map(arr=>{if(arr.length===0)return null;return arr.reduce((s,v)=>s+v,0)/(['weight','rhr','hrv','vo2_max'].includes(metric)?arr.length:1)});
    axisLabels=monthLabels;
  }
  new Chart(ctx,{
    type:useBar?'bar':'line',
    data:{labels:axisLabels,datasets:[{
      label:def.label,
      data:values,
      backgroundColor:c,
      borderColor:c,
      borderWidth:2,
      pointRadius:useBar?0:3,
      tension:0.3,
      fill:false,
      borderRadius:useBar?6:0,
      spanGaps:true,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:true}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#B7BCC9',font:{size:10}}},
        y:{grid:{color:'rgba(217,223,230,0.4)'},ticks:{color:'#B7BCC9',font:{size:10}},beginAtZero:useBar}
      }
    }

async function findPreviousPhotoPath(side='front'){
  // Side-aware ghost-overlay reference: when taking a Front photo, only look at Front history.
  // When taking a Side photo, only look at Side history. Falls back to legacy entry.photo for
  // Front (since old entries had single photos with no side designation).
  console.log('[ghost] looking for reference photo (side='+side+')');
  const key=side==='side'?'photoSide':'photoFront';
  const draftDataKey=side==='side'?'photoSideDataUrl':'photoFrontDataUrl';
  const draftPathKey=side==='side'?'photoSidePath':'photoFrontPath';
  // Priority 1: just-captured photo in the current draft for THIS side
  if(state.draft.le&&state.draft.le[draftDataKey]){
    console.log('[ghost] using draft '+draftDataKey);
    return{dataUrl:state.draft.le[draftDataKey],date:today(),label:'just taken'};
  }
  // Priority 2: draft path for THIS side (already-uploaded earlier in session)
  if(state.draft.le&&state.draft.le[draftPathKey]){
    return{path:state.draft.le[draftPathKey],date:today(),label:'today'};
  }
  const t=today();
  // Priority 3: today's saved entry photo for THIS side (+ legacy fallback for Front only)
  const todayEntryNow=state.data.entries[t];
  if(todayEntryNow){
    const p=todayEntryNow[key]||(side==='front'?todayEntryNow.photo:null);
    if(p)return{path:p,date:t,label:'today'};
  }
  // Priority 4: most recent prior photo for THIS side (front falls back to legacy `photo`)
  let entries=Object.entries(state.data.entries).filter(([d,e])=>e[key]||(side==='front'&&e.photo)).sort((a,b)=>b[0].localeCompare(a[0]));
  if(entries.length>0){
    const top=entries[0];
    const p=top[1][key]||top[1].photo;
    console.log('[ghost] using most-recent '+side+' photo from',top[0]);
    return{path:p,date:top[0],label:top[0]===t?'today':fmtDate(top[0])};
  }
  // Last-ditch: pull from GitHub and re-check
  console.log('[ghost] no local '+side+' photos, pulling from GitHub…');
  try{if(isConfigured())await pullData()}catch(e){console.warn('pullData failed',e)}
  entries=Object.entries(state.data.entries).filter(([d,e])=>e[key]||(side==='front'&&e.photo)).sort((a,b)=>b[0].localeCompare(a[0]));
  if(entries.length===0){console.log('[ghost] no '+side+' photos found anywhere');return null}
  const top=entries[0];
  const p=top[1][key]||top[1].photo;
  return{path:p,date:top[0],label:top[0]===t?'today':fmtDate(top[0])};
}
async function openCameraOverlay(onCapture, side='front'){

  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;animation:fade-in 0.2s';

</div>
<div style="flex:1;position:relative;overflow:hidden;background:#111">

  <img id="cam-overlay" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;pointer-events:none;transition:opacity 0.3s">

    <button id="cam-toggle" style="width:60px;height:36px;border-radius:18px;background:rgba(255,255,255,0.15);color:white;font-size:11px;opacity:0.4" disabled>Ghost</button>
  </div>
  <p id="cam-hint" style="text-align:center;font-size:11px;color:rgba(255,255,255,0.6);margin-top:14px">Loading…</p>
</div>`;
  document.body.appendChild(modal);
  const v=modal.querySelector('#cam-v'),overlay=modal.querySelector('#cam-overlay');
  const statusEl=modal.querySelector('#cam-status'),hintEl=modal.querySelector('#cam-hint');
  const msgBox=modal.querySelector('#cam-msg'),msgText=modal.querySelector('#cam-msg-text');
  const controlsRow=modal.querySelector('#cam-controls-row'),toggleBtn=modal.querySelector('#cam-toggle');
  const opSlider=modal.querySelector('#cam-op'),opVal=modal.querySelector('#cam-opv');
  const cleanup=()=>{if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}};
  const startCamera=async()=>{
    cleanup();
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      msgText.textContent='Your browser does not support camera access. Use Gallery instead.';
      return false;
    }
    msgText.textContent='Requesting camera access…';
    msgBox.style.display='flex';
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},audio:false});
      v.srcObject=stream;
      await v.play().catch(()=>{});
      msgBox.style.display='none';
      statusEl.textContent=overlayUrl?'Ghost overlay ON':'Camera ready';
      return true;
    }catch(e){
      const err=e.name||'';
      let msg='Camera failed: '+(e.message||err);
      if(err==='NotAllowedError'||err==='PermissionDeniedError')msg='Camera permission denied. Grant access in browser/app settings, or use Gallery.';
      else if(err==='NotFoundError')msg='No camera found on this device.';
      else if(err==='NotReadableError')msg='Camera is in use by another app. Close it and try again.';
      msgText.textContent=msg;
      statusEl.textContent='Camera unavailable';
      return false;
    }
  };
  // Start camera immediately
  startCamera();
  // Fetch ghost photo in background
  hintEl.textContent='Looking for your last photo to overlay…';
  findPreviousPhotoPath(side).then(async ref=>{
    if(!ref){hintEl.textContent='First photo — future shots will overlay this one';return}
    hintEl.textContent='Loading ghost from '+(ref.label||fmtDate(ref.date))+'…';
    let dataUrl=ref.dataUrl;
    try{
      if(!dataUrl)dataUrl=await downloadPhoto(ref.path);

      overlay.src=dataUrl;

      hintEl.textContent='Match your pose to the faded image (from '+(ref.label||fmtDate(ref.date))+')';
      statusEl.textContent='Ghost overlay ON';
      let visible=true;
      toggleBtn.addEventListener('click',()=>{visible=!visible;overlay.style.opacity=visible?(opSlider.value/100):'0';toggleBtn.textContent=visible?'Hide':'Show';statusEl.textContent=visible?'Ghost overlay ON':'Ghost OFF'});
      opSlider.addEventListener('input',e=>{const v=parseInt(e.target.value,10);if(visible)overlay.style.opacity=String(v/100);opVal.textContent=v+'%'});
    }catch(e){hintEl.textContent='Could not load ghost photo: '+e.message}
  });
  modal.querySelector('#cam-x').addEventListener('click',()=>{cleanup();modal.remove()});
  modal.querySelector('#cam-flip').addEventListener('click',()=>{facing=facing==='user'?'environment':'user';startCamera()});
  // Gallery fallback uses file input
  modal.querySelector('#cam-fallback').addEventListener('click',()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{const u=await compressImage(f);cleanup();modal.remove();onCapture(u)}catch(err){toast('Photo error: '+err.message,'error')}});
    inp.click();
  });
  modal.querySelector('#cam-shoot').addEventListener('click',()=>{
    if(!stream){toast('Camera not ready','error');return}
    const c=document.createElement('canvas');
    c.width=v.videoWidth||1080;c.height=v.videoHeight||1920;
    const ctx=c.getContext('2d');
    if(facing==='user'){ctx.translate(c.width,0);ctx.scale(-1,1)}
    ctx.drawImage(v,0,0,c.width,c.height);
    const maxDim=1080;
    let w=c.width,hgt=c.height;
    if(w>hgt&&w>maxDim){hgt=Math.round(hgt*maxDim/w);w=maxDim}
    else if(hgt>maxDim){w=Math.round(w*maxDim/hgt);hgt=maxDim}
    const c2=document.createElement('canvas');c2.width=w;c2.height=hgt;
    c2.getContext('2d').drawImage(c,0,0,w,hgt);
    const dataUrl=c2.toDataURL('image/jpeg',0.85);
    cleanup();modal.remove();
    onCapture(dataUrl);
  });
}

      if(!g||g<=0){inp.focus();return}

      const kcal=Math.round((f.kcal||0)*g/100);
      const prot=Math.round((f.protein||0)*g/100*10)/10;

      recordFoodUsage(entry.foodId);

      openCustomFood(food=>{state.data.customFoods=state.data.customFoods||[];state.data.customFoods.push(food);saveLocalData();expanded=food.id;render2()});
    });
  };
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove()});
  document.body.appendChild(modal);
  render2();
  setTimeout(()=>modal.querySelector('#fp-q')?.focus(),100);
}
